// segurança — qualquer que seja o conteúdo real (aspas, &, <, etc não quebram nada).
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

// Retorna as tags de estratégia que batem com o nome da campanha.
// Se nenhuma bater, retorna ['Sem tag'].
function fbApiTagsForCampaign(camp) {
  const norm = fbNormalize(camp.name);
  const tags = FB.strategyTags.filter(t =>
    t.match.some(group => group.every(kw => norm.includes(fbNormalize(kw))))
  );
  return tags.length ? tags.map(t => t.label) : ['Sem tag'];
}

// Agrupa as campanhas filtradas por tag de estratégia, somando investimento
// e leads (cruzados com o Pipedrive) por tag.
// Resolve o período efetivo de comparação: usa as datas escolhidas no filtro,
// ou espelha o date_preset 'last_30d' usado na chamada à API quando vazio —
// pra leads do Pipedrive serem comparados contra o mesmo período do investimento.
function fbApiResolvedDateRange() {
  if (FB.f.dateFrom && FB.f.dateTo) {
    const to = new Date(FB.f.dateTo); to.setHours(23, 59, 59, 999);
    return { from: new Date(FB.f.dateFrom), to };
  }
  const to = new Date(); to.setHours(23, 59, 59, 999);
  const from = new Date(); from.setDate(from.getDate() - 29); from.setHours(0, 0, 0, 0);
  return { from, to };
}

// Conta leads do Pipedrive (origem Meta) cujo utm_campaign bate com QUALQUER
// uma das palavras-chave das tags informadas — não com o nome exato de uma
// campanha específica. Mais robusto: não depende de nome de campanha e nome
// de UTM serem escritos de forma idêntica, e já ignora "+" / "|" / acentos via
// fbNormalize. Roda o filtro do Pipedrive UMA vez (independente de quantas tags
// foram passadas), evitando contar o mesmo lead duas vezes.
//
// Se "unit" for informado, restringe aos leads daquela unidade: primeiro pelo
// PIPELINE do Pipedrive (Brasília tem pipeline próprio; Morumbi e Alphaville
// compartilham o pipeline "Marketing São Paulo" — confirmado pelo usuário), e
// quando duas unidades compartilham o mesmo pipeline, exige também a palavra
// da unidade no UTM (source/campanha) pra desambiguar.
function fbApiDealsForTags(tagLabels, unit) {
  const { from, to } = fbApiResolvedDateRange();
  const tags = FB.strategyTags.filter(t => tagLabels.includes(t.label));
  const wantsSemTag = tagLabels.includes('Sem tag');
  const pipelineKw = unit ? fbNormalize(FB.unitPipelineKeyword[unit] || '') : '';
  const disambigKw = unit ? fbNormalize(FB.unitDisambiguateKeyword[unit] || '') : '';

  return PD.allDeals.filter(d => {
    if (!pdIsMetaOrigin(d)) return false;
    const created = new Date(d.add_time);
    if (created < from || created > to) return false;

    if (pipelineKw) {
      const plName = fbNormalize(pdPipelineName(d.pipeline_id));
      if (!plName.includes(pipelineKw)) return false;
    }
    if (disambigKw) {
      const blob = fbNormalize(pdGetUTM(d, 'source') + ' ' + pdGetUTM(d, 'campaign'));
      if (!blob.includes(disambigKw)) return false;
    }

    const utmNorm = fbNormalize(pdGetUTM(d, 'campaign'));
    if (!utmNorm) return false;
    const matchesKnownTag = FB.strategyTags.some(t => t.match.some(group => group.every(kw => utmNorm.includes(fbNormalize(kw)))));
    if (wantsSemTag && !matchesKnownTag) return true;
    return tags.some(t => t.match.some(group => group.every(kw => utmNorm.includes(fbNormalize(kw)))));
  });
}

function fbApiLeadsForTags(tagLabels, unit) {
  return fbApiDealsForTags(tagLabels, unit).length;
}

function fbApiLeadsForStrategyTag(tagLabel) {
  return fbApiLeadsForTags([tagLabel]);
}

// Soma os leads de uma tag entre as unidades informadas, consultando cada
// unidade separadamente (pipeline diferente = consulta separada, sem misturar
// e sem contar 2x — cada unidade é uma fatia própria do Pipedrive).
function fbApiLeadsForTagAcrossUnits(tagLabel, units) {
  return units.reduce((sum, u) => sum + fbApiLeadsForTags([tagLabel], u), 0);
}

function fbApiStrategyBreakdown() {
  const map = {};
  FB.filtered.forEach(c => {
    fbApiTagsForCampaign(c).forEach(label => {
      if (!map[label]) map[label] = { spend: 0, campaigns: new Set(), units: new Set() };
      map[label].spend += c.spend;
      map[label].campaigns.add(c.name);
      map[label].units.add(c.unit);
    });
  });
  return Object.entries(map)
    .map(([label, v]) => ({ label, spend: v.spend, leads: fbApiLeadsForTagAcrossUnits(label, [...v.units]), campaigns: v.campaigns.size }))
    .sort((a, b) => b.spend - a.spend);
}

async function fbApiFetchLevel(accountId, level, fields) {
  const params = new URLSearchParams({ access_token: FB.TOKEN, level, fields, limit: '500' });
  if (FB.f.dateFrom && FB.f.dateTo) {
    params.set('time_range', JSON.stringify({ since: FB.f.dateFrom, until: FB.f.dateTo }));
  } else {
    params.set('date_preset', FB.datePreset);
  }
  const url = `https://graph.facebook.com/${FB.VERSION}/${accountId}/insights?${params.toString()}`;
  const r = await fetch(url);
  const json = await r.json();
  if (json.error) throw new Error(`${json.error.message} (conta ${accountId}, nível ${level})`);
  return json.data || [];
}

async function fbApiInit() {
  const cont = document.getElementById('fbApiMain');
  cont.innerHTML = `<div class="pd-loading"><div class="pd-spinner"></div><span>Carregando campanhas, conjuntos e anúncios do Meta Ads…</span></div>`;
  try {
    const campaigns = [], adsets = [], ads = [];
    for (const acc of FB.accounts) {
      // Campanhas
      const cRows = await fbApiFetchLevel(acc.id, 'campaign', 'campaign_id,campaign_name,spend,impressions,reach,clicks,date_start,date_stop');
      cRows.forEach(r => campaigns.push({
        unit: acc.unit, account_id: acc.id,
        campaign_id: r.campaign_id, name: r.campaign_name || '(sem nome)',
        spend: parseFloat(r.spend || 0), impressions: parseInt(r.impressions || 0, 10),
        reach: parseInt(r.reach || 0, 10), clicks: parseInt(r.clicks || 0, 10),
        date_start: r.date_start, date_stop: r.date_stop,
      }));

      // Conjuntos de anúncios
      const sRows = await fbApiFetchLevel(acc.id, 'adset', 'campaign_name,adset_id,adset_name,spend,impressions,reach,clicks,date_start,date_stop');
      sRows.forEach(r => adsets.push({
        unit: acc.unit, account_id: acc.id,
        campaign_name: r.campaign_name || '(sem nome)',
        adset_id: r.adset_id, name: r.adset_name || '(sem nome)',
        spend: parseFloat(r.spend || 0), impressions: parseInt(r.impressions || 0, 10),
        reach: parseInt(r.reach || 0, 10), clicks: parseInt(r.clicks || 0, 10),
        date_start: r.date_start, date_stop: r.date_stop,
      }));

      // Anúncios / criativos
      const aRows = await fbApiFetchLevel(acc.id, 'ad', 'campaign_name,adset_name,ad_id,ad_name,spend,impressions,reach,clicks,date_start,date_stop');
      aRows.forEach(r => ads.push({
        unit: acc.unit, account_id: acc.id,
        campaign_name: r.campaign_name || '(sem nome)',
        adset_name: r.adset_name || '(sem nome)',
        ad_id: r.ad_id, name: r.ad_name || '(sem nome)',
        spend: parseFloat(r.spend || 0), impressions: parseInt(r.impressions || 0, 10),
        reach: parseInt(r.reach || 0, 10), clicks: parseInt(r.clicks || 0, 10),
        date_start: r.date_start, date_stop: r.date_stop,
      }));
    }
    FB.campaigns = campaigns;
    FB.adsets = adsets;
    FB.ads = ads;
    FB.loaded = true;

    // Garante que os deals do Pipedrive estão carregados, pra cruzar o CPL real
    if (!PD.allDeals.length) {
      await pdInit();
    }

    fbApiRenderSkeleton();
    fbApiApplyFilters();
  } catch (e) {
    cont.innerHTML = `<div class="pd-error">❌ Erro ao conectar ao Meta Ads: ${e.message}<br><small>Verifique o token, a permissão "ads_read" e se o usuário de sistema tem acesso a essas contas. Se o erro for genérico de rede, pode ser bloqueio de CORS — teste abrindo o arquivo direto no navegador, fora do preview.</small></div>`;
  }
}

async function fbApiReload() {
  FB.campaigns = [];
  FB.adsets = [];
  FB.ads = [];
  FB.loaded = false;
  await fbApiInit();
}

function fbApiClearFilters() {
  FB.f = { unit: '', dateFrom: '', dateTo: '' };
  fbApiReload();
}

function fbApiApplyFilters() {
  const f = FB.f;
  FB.filtered = FB.campaigns.filter(c => !f.unit || c.unit === f.unit);
  FB.filteredAdsets = FB.adsets.filter(c => !f.unit || c.unit === f.unit);
  FB.filteredAds = FB.ads.filter(c => !f.unit || c.unit === f.unit);
  fbApiRenderKPIs();
  fbApiRenderChart();
  fbApiRenderCplBars();
  fbApiRenderStrategy();
  fbApiRenderHighlights();
  fbApiRenderLeadsTable();
  fbApiRenderCreatives();
  fbApiRenderHierarchy();
}

// Conta quantos leads do Pipedrive correspondem a esse anúncio/criativo do Meta,
// cruzando pelo campo utm_content (convenção padrão pra identificar o criativo).
// Só funciona se o time realmente preencher utm_content nos links dos anúncios.
function fbApiLeadsForAd(ad) {
  const nameLow = fbNormalize(ad.name);
  if (!nameLow) return 0;
  return PD.allDeals.filter(d => {
    const isMeta = pdIsMetaOrigin(d);
    if (!isMeta) return false;
    const utmContent = fbNormalize(pdGetUTM(d, 'content'));
    if (!utmContent) return false;
    if (!utmContent.includes(nameLow) && !nameLow.includes(utmContent)) return false;
    if (ad.date_start) {
      const created = new Date(d.add_time);
      if (created < new Date(ad.date_start)) return false;
      if (ad.date_stop) {
        const stop = new Date(ad.date_stop); stop.setHours(23, 59, 59, 999);
        if (created > stop) return false;
      }
    }
    return true;
  }).length;
}

// Conta quantos leads do Pipedrive "pertencem" a essa campanha — via a(s)
// tag(s) de estratégia da campanha (ex: "Diálise Noturna"), não pelo nome
// completo. Isso significa que campanhas-cópia da MESMA estratégia mostram o
// mesmo total de leads (o da estratégia toda), porque não há como saber pelo
// utm_campaign sozinho qual cópia específica gerou qual lead — só dá pra saber
// a estratégia. O CPL de cada cópia varia pelo investimento de cada uma.
// Campanha "Sem tag" retorna 0 (não tem palavra-chave pra cruzar).
function fbApiLeadsForCampaign(camp) {
  const tags = fbApiTagsForCampaign(camp).filter(t => t !== 'Sem tag');
  if (!tags.length) return 0;
  return fbApiLeadsForTags(tags, camp.unit);
}

// ── Métricas calculadas ──
function fbMetricCTR(c) { return c.impressions > 0 ? (c.clicks / c.impressions) * 100 : 0; }
function fbMetricCPM(c) { return c.impressions > 0 ? (c.spend / c.impressions) * 1000 : 0; }

// Monta a árvore Campanha → Conjunto → Anúncio a partir dos dados já filtrados
// por unidade. O vínculo é por nome (unidade + nome da campanha/conjunto),
// já que a API não retorna os IDs cruzados entre níveis na mesma chamada.
function fbApiBuildTree() {
  return [...FB.filtered].sort((a, b) => b.spend - a.spend).map(camp => {
    const adsets = FB.filteredAdsets
      .filter(s => s.unit === camp.unit && s.campaign_name === camp.name)
      .sort((a, b) => b.spend - a.spend)
      .map(s => {
        const ads = FB.filteredAds
          .filter(a => a.unit === camp.unit && a.campaign_name === camp.name && a.adset_name === s.name)
          .sort((a, b) => b.spend - a.spend);
        return { ...s, _ads: ads };
      });
    return { ...camp, _adsets: adsets };
  });
}

// Calcula os 3 cards de destaque: melhor campanha (CPL, se houver leads),
// melhor conjunto e melhor criativo (por CTR, com piso de impressões pra
// não premiar amostra pequena demais).
// Agrupa todos os anúncios filtrados pelo NOME do criativo (normalizado —
// ignora acento/maiúscula/separador), somando investimento e métricas de mídia
// de todas as ocorrências — inclusive quando o mesmo criativo se repete em
// campanhas duplicadas ("- Cópia", etc). Guarda a data mínima/máxima entre as
// ocorrências pra cruzar leads do Pipedrive uma única vez (evita contar o
// mesmo lead repetido por aparecer em mais de uma cópia da campanha).
// Mapa unidade+nome da campanha -> tags de estratégia, pra identificar a
// estratégia de cada criativo a partir da campanha onde ele roda.
function fbApiCampaignTagMap() {
  const map = {};
  FB.filtered.forEach(c => { map[c.unit + '|' + c.name] = fbApiTagsForCampaign(c); });
  return map;
}

function fbApiCreativeGroups() {
  const tagMap = fbApiCampaignTagMap();
  const map = {};
  FB.filteredAds.forEach(ad => {
    const key = fbNormalize(ad.name) || '(sem nome)';
    if (!map[key]) {
      map[key] = {
        name: ad.name || '(sem nome)', units: new Set(), occurrences: 0,
        spend: 0, impressions: 0, reach: 0, clicks: 0,
        dateMin: null, dateMax: null, tags: new Set(),
      };
    }
    const g = map[key];
    g.units.add(ad.unit);
    g.occurrences += 1;
    g.spend += ad.spend;
    g.impressions += ad.impressions;
    g.reach += ad.reach;
    g.clicks += ad.clicks;
    if (ad.date_start && (!g.dateMin || ad.date_start < g.dateMin)) g.dateMin = ad.date_start;
    if (ad.date_stop && (!g.dateMax || ad.date_stop > g.dateMax)) g.dateMax = ad.date_stop;
    // Estratégia = tag(s) da campanha onde esse criativo está rodando. Se o mesmo
    // criativo aparecer em campanhas de tags diferentes, acumula todas (raro, mas honesto).
    const campTags = tagMap[ad.unit + '|' + ad.campaign_name] || ['Sem tag'];
    campTags.forEach(t => g.tags.add(t));
  });
  return Object.values(map);
}

// Mesma lógica de cruzamento de fbApiLeadsForAd, mas pro grupo consolidado —
// roda o filtro do Pipedrive UMA vez pro nome do criativo, usando o intervalo
// de datas que cobre todas as ocorrências, em vez de somar lead por ocorrência
// (o que duplicaria a contagem quando o criativo roda em campanhas paralelas).
function fbApiLeadsForCreativeGroup(g) {
  const nameLow = fbNormalize(g.name);
  if (!nameLow) return 0;
  return PD.allDeals.filter(d => {
    const isMeta = pdIsMetaOrigin(d);
    if (!isMeta) return false;
    const utmContent = fbNormalize(pdGetUTM(d, 'content'));
    if (!utmContent) return false;
    if (!utmContent.includes(nameLow) && !nameLow.includes(utmContent)) return false;
    if (g.dateMin) {
      const created = new Date(d.add_time);
      if (created < new Date(g.dateMin)) return false;
      if (g.dateMax) {
        const stop = new Date(g.dateMax); stop.setHours(23, 59, 59, 999);
        if (created > stop) return false;
      }
    }
    return true;
  }).length;
}

function fbApiComputeHighlights() {
  const MIN_IMPR = 500;

  const campsWithLeads = FB.filtered
    .map(c => ({ c, leads: fbApiLeadsForCampaign(c) }))
    .filter(x => x.leads > 0)
    .map(x => ({ ...x, cpl: x.c.spend / x.leads }));
  let bestCampaign = null;
  if (campsWithLeads.length) {
    bestCampaign = campsWithLeads.sort((a, b) => a.cpl - b.cpl)[0];
  }

  const adsetsEligible = FB.filteredAdsets.filter(s => s.impressions >= MIN_IMPR);
  const bestAdset = adsetsEligible.length
    ? [...adsetsEligible].sort((a, b) => fbMetricCTR(b) - fbMetricCTR(a))[0]
    : null;

  // "Melhor criativo" usa o GRUPO consolidado (não a ocorrência isolada), pra
  // bater com o que aparece na tabela de Análise de Criativos.
  const creativeGroups = fbApiCreativeGroups().filter(g => g.impressions >= MIN_IMPR);
  const bestAd = creativeGroups.length
    ? [...creativeGroups].sort((a, b) => fbMetricCTR(b) - fbMetricCTR(a))[0]
    : null;

  return { bestCampaign, bestAdset, bestAd, minImpr: MIN_IMPR };
}

function fbApiToggleNode(key) {
  if (FB.expanded.has(key)) FB.expanded.delete(key);
  else FB.expanded.add(key);
  fbApiRenderHierarchy();
}

function fbApiExpandAll(open) {
  FB.expanded.clear();
  if (open) {
    fbApiBuildTree().forEach((camp, ci) => {
      FB.expanded.add('c:' + ci);
      camp._adsets.forEach((s, si) => FB.expanded.add('s:' + ci + ':' + si));
    });
  }
  fbApiRenderHierarchy();
}

function fbApiToggleDebugList(kind) {
  // Comportamento de acordeão: abrir um fecha os outros, evita acumular textareas abertas.
  ['campaigns', 'adsets', 'ads', 'utms', 'pipelines'].forEach(k => {
    if (k !== kind) document.getElementById('fbApiDebugWrap_' + k).style.display = 'none';
  });
  const wrap = document.getElementById('fbApiDebugWrap_' + kind);
  const visible = wrap.style.display !== 'none';
  wrap.style.display = visible ? 'none' : 'block';
  if (visible) return;

  let lines;
  if (kind === 'campaigns') {
    lines = [...FB.filtered]
      .map(c => ({ c, tags: fbApiTagsForCampaign(c) }))
      .sort((a, b) => {
        const aSemTag = a.tags.includes('Sem tag') ? 0 : 1;
        const bSemTag = b.tags.includes('Sem tag') ? 0 : 1;
        if (aSemTag !== bSemTag) return aSemTag - bSemTag;
        return b.c.spend - a.c.spend;
      })
      .map(({ c, tags }) => `[${tags.join(', ')}] ${c.unit} | ${c.name} | R$ ${c.spend.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`);
  } else if (kind === 'adsets') {
    lines = [...FB.filteredAdsets]
      .sort((a, b) => b.spend - a.spend)
      .map(c => `${c.unit} | ${c.campaign_name} > ${c.name} | R$ ${c.spend.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`);
  } else if (kind === 'ads') {
    lines = [...FB.filteredAds]
      .sort((a, b) => b.spend - a.spend)
      .map(c => `${c.unit} | ${c.campaign_name} > ${c.adset_name} > ${c.name} | R$ ${c.spend.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`);
  } else if (kind === 'pipelines') {
    // Nome real de cada pipeline (funil) do Pipedrive onde há leads com
    // origem Meta — pra confirmar se as palavras-chave de unitPipelineKeyword
    // realmente batem com o pipeline de cada unidade.
    const map = {};
    PD.allDeals.forEach(d => {
      if (!pdIsMetaOrigin(d)) return;
      const plName = pdPipelineName(d.pipeline_id) || '(sem pipeline)';
      map[plName] = (map[plName] || 0) + 1;
    });
    lines = Object.entries(map)
      .sort((a, b) => b[1] - a[1])
      .map(([pl, count]) => `${count} lead(s) → pipeline = "${pl}"`);
    if (!lines.length) lines = ['Nenhum lead com origem Meta/Facebook/Instagram encontrado no Pipedrive.'];
  } else {
    // kind === 'utms': o que está REALMENTE salvo no campo utm_campaign dos
    // leads do Pipedrive com origem Meta — pra comparar com o nome real das
    // campanhas e descobrir por que o cruzamento de leads não bate.
    const map = {};
    PD.allDeals.forEach(d => {
      const isMeta = pdIsMetaOrigin(d);
      if (!isMeta) return;
      const utmCampaign = pdGetUTM(d, 'campaign') || '(vazio)';
      map[utmCampaign] = (map[utmCampaign] || 0) + 1;
    });
    lines = Object.entries(map)
      .sort((a, b) => b[1] - a[1])
      .map(([utm, count]) => `${count} lead(s) → utm_campaign = "${utm}"`);
    if (!lines.length) lines = ['Nenhum lead com origem Meta/Facebook/Instagram encontrado no Pipedrive.'];
  }
  document.getElementById('fbApiDebugText_' + kind).value = lines.join('\n');
}

function fbApiCopyDebugList(kind) {
  const ta = document.getElementById('fbApiDebugText_' + kind);
  ta.select();
  document.execCommand('copy');
}

// Mesmo cruzamento usado no KPI "Leads (Pipedrive)" de fbApiRenderKPIs — uma
// passada por unidade presente nas campanhas filtradas, com as tags daquela
// unidade — só que aqui devolve os negócios em si, não só a contagem. Por
// construção, deals.length bate exatamente com o número mostrado no KPI.
function fbApiMatchedLeadDeals() {
  const tagsPorUnidade = {};
  FB.filtered.forEach(c => {
    if (!tagsPorUnidade[c.unit]) tagsPorUnidade[c.unit] = new Set();
    fbApiTagsForCampaign(c).filter(t => t !== 'Sem tag').forEach(t => tagsPorUnidade[c.unit].add(t));
  });
  const seen = new Set();
  const result = [];
  Object.entries(tagsPorUnidade).forEach(([unit, tagSet]) => {
    const tags = [...tagSet];
    if (!tags.length) return;
    fbApiDealsForTags(tags, unit).forEach(d => {
      if (!seen.has(d.id)) { seen.add(d.id); result.push(d); }
    });
  });
  return result;
}

function fbApiRenderLeadsTable() {
  const tbody = document.getElementById('fbApiLeadsTableBody');
  const countEl = document.getElementById('fbApiLeadsCount');
  if (!tbody) return;

  const deals = fbApiMatchedLeadDeals().sort((a, b) => new Date(b.add_time) - new Date(a.add_time));
  countEl.textContent = `${deals.length.toLocaleString('pt-BR')} leads`;

  const medCell = (deal, key) => {
    const v = pdFieldDisplay(deal, key);
    if (v === null) return `<span style="color:var(--bad);font-size:11px;">campo não mapeado</span>`;
    if (v === '—') return `<span style="color:var(--ink-4)">—</span>`;
    return esc(v);
  };

  tbody.innerHTML = deals.map(d => {
    const dt = d.add_time ? new Date(d.add_time).toLocaleDateString('pt-BR') : '—';
    const cmp = pdGetUTM(d, 'campaign') || '—';
    const name = d.person_name || d.title || '—';
    const { phone, email } = pdPersonContact(d);
    const stageLabel = pdDealStageLabel(d);
    const stageColor = pdStageColor(stageLabel);

    return `<tr>
      <td style="font-size:11px;color:var(--ink-3);white-space:nowrap;">${dt}</td>
      <td>${cmp !== '—' ? `<span class="pd-utm-tag campaign" title="${esc(cmp)}">${esc(cmp.length > 30 ? cmp.slice(0,30)+'…' : cmp)}</span>` : '<span style="color:var(--ink-4);font-size:11px">—</span>'}</td>
      <td><span class="pd-stage-pill" style="background:${stageColor}22;color:${stageColor}">${esc(stageLabel)}</span></td>
      <td><div class="pd-lead-name">${esc(name)}</div></td>
      <td style="white-space:nowrap;font-size:12px;">${phone ? esc(phone) : '<span style="color:var(--ink-4)">—</span>'}</td>
      <td style="font-size:12px;">${email ? esc(email) : '<span style="color:var(--ink-4)">—</span>'}</td>
      <td>${medCell(d, PD.medKeys.convenio)}</td>
      <td>${medCell(d, PD.medKeys.dialise)}</td>
      <td>${medCell(d, PD.medKeys.clinica)}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="9" class="pd-empty">Nenhum lead encontrado para esse filtro.</td></tr>`;
}

function fbApiRenderKPIs() {
  const totalSpend = FB.filtered.reduce((s, c) => s + c.spend, 0);
  const totalImpr = FB.filtered.reduce((s, c) => s + c.impressions, 0);
  const totalReach = FB.filtered.reduce((s, c) => s + c.reach, 0);
  // Total de leads = uma passada por UNIDADE presente nas campanhas filtradas
  // (cada unidade = pipeline próprio no Pipedrive, não pode misturar), com as
  // tags daquela unidade — depois soma entre as unidades. Não é a soma de
  // fbApiLeadsForCampaign por campanha (isso repetiria o mesmo lead uma vez
  // por campanha que compartilha tag E unidade).
  const tagsPorUnidade = {};
  FB.filtered.forEach(c => {
    if (!tagsPorUnidade[c.unit]) tagsPorUnidade[c.unit] = new Set();
    fbApiTagsForCampaign(c).filter(t => t !== 'Sem tag').forEach(t => tagsPorUnidade[c.unit].add(t));
  });
  const totalLeads = Object.entries(tagsPorUnidade).reduce((sum, [unit, tagSet]) => {
    const tags = [...tagSet];
    return tags.length ? sum + fbApiLeadsForTags(tags, unit) : sum;
  }, 0);
  const cplMedio = totalLeads > 0 ? (totalSpend / totalLeads) : null;
  const fmtR$ = v => 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const kpis = [
    { label: 'Investimento Total', value: fmtR$(totalSpend), sub: `${FB.filtered.length} campanha(s)` },
    { label: 'Leads (Pipedrive)', value: totalLeads.toLocaleString('pt-BR'), sub: 'origem Meta, cruzado por UTM' },
    { label: 'Custo por Lead', value: cplMedio !== null ? fmtR$(cplMedio) : '—', sub: cplMedio !== null ? 'investimento ÷ leads' : 'sem leads casados no período' },
    { label: 'Impressões', value: totalImpr.toLocaleString('pt-BR'), sub: 'soma do período' },
    { label: 'Alcance', value: totalReach.toLocaleString('pt-BR'), sub: 'soma por campanha (pode sobrepor)' },
  ];

  document.getElementById('fbApiKpis').innerHTML = kpis.map(k => `
    <div class="pd-kpi">
      <div class="pd-kpi-label">${k.label}</div>
      <div class="pd-kpi-value">${k.value}</div>
      <div class="pd-kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function fbApiRenderChart() {
  const unitTotals = {};
  FB.filtered.forEach(c => { unitTotals[c.unit] = (unitTotals[c.unit] || 0) + c.spend; });
  const labels = Object.keys(unitTotals);
  const data = labels.map(l => unitTotals[l]);
  const COLORS = ['#C9A96E','#38BDF8','#818CF8','#F472B6','#34D399'];

  const ctx = document.getElementById('fbApiChartUnit');
  if (!ctx) return;
  if (FB.chartUnit) FB.chartUnit.destroy();
  FB.chartUnit = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: COLORS, borderWidth: 2, borderColor: '#15171D' }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { position: 'right', labels: { font: { size: 11, family: 'DM Sans' }, boxWidth: 10, padding: 10 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: R$ ${ctx.parsed.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` } }
      }
    }
  });
}

function fbApiRenderCplBars() {
  const el = document.getElementById('fbApiCplBars');
  if (!el) return;
  const sorted = [...FB.filtered].sort((a, b) => b.spend - a.spend).slice(0, 10);
  const maxSpend = sorted[0]?.spend || 1;
  el.innerHTML = sorted.map(c => {
    const leads = fbApiLeadsForCampaign(c);
    const cpl = leads > 0 ? (c.spend / leads) : null;
    const pct = Math.round((c.spend / maxSpend) * 100);
    const cplLabel = cpl !== null ? `R$ ${cpl.toFixed(2).replace('.', ',')}` : 'sem leads';
    return `
      <div class="pd-funnel-row">
        <span class="pd-funnel-name" title="${c.name} — ${c.unit}">${c.name} <span style="color:var(--ink-4)">(${c.unit})</span></span>
        <div class="pd-funnel-track"><div class="pd-funnel-fill" style="width:${pct}%;background:var(--m)"></div></div>
        <span class="pd-funnel-count">${cplLabel}</span>
      </div>
    `;
  }).join('') || `<div class="pd-empty">Nenhuma campanha encontrada.</div>`;
}

function fbApiRenderStrategy() {
  const barsEl = document.getElementById('fbApiStrategyBars');
  const tbody = document.getElementById('fbApiStrategyTableBody');
  if (!barsEl || !tbody) return;

  const rows = fbApiStrategyBreakdown();
  const totalSpend = FB.filtered.reduce((s, c) => s + c.spend, 0) || 1;
  const maxSpend = rows[0]?.spend || 1;

  barsEl.innerHTML = rows.map(r => {
    const pct = Math.round((r.spend / maxSpend) * 100);
    const pctTotal = ((r.spend / totalSpend) * 100).toFixed(0);
    const color = r.label === 'Sem tag' ? 'var(--ink-4)' : 'var(--m)';
    return `
      <div class="pd-funnel-row">
        <span class="pd-funnel-name" title="${r.campaigns} campanha(s)">${r.label}</span>
        <div class="pd-funnel-track"><div class="pd-funnel-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="pd-funnel-count">R$ ${r.spend.toLocaleString('pt-BR', { minimumFractionDigits: 2 })} (${pctTotal}%)</span>
      </div>
    `;
  }).join('') || `<div class="pd-empty">Nenhuma campanha encontrada.</div>`;

  tbody.innerHTML = rows.map(r => {
    const cpl = r.leads > 0 ? (r.spend / r.leads) : null;
    return `<tr>
      <td>${r.label}</td>
      <td style="font-family:'DM Mono',monospace">R$ ${r.spend.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
      <td>${((r.spend / totalSpend) * 100).toFixed(1)}%</td>
      <td>${r.campaigns}</td>
      <td>${r.leads}</td>
      <td style="font-family:'DM Mono',monospace">${cpl !== null ? 'R$ ' + cpl.toFixed(2).replace('.', ',') : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" class="pd-empty">Sem dados.</td></tr>`;
}

function fbApiRenderHighlights() {

  cards.push(`

    </div>
  `);

  cards.push(`
    <div class="fb-highlight-card">
      <div class="fb-highlight-label">Melhor Criativo (CTR, consolidado)</div>
      ${bestAd ? `
        <div class="fb-highlight-name">${esc(bestAd.name)}</div>

  const sf = FB.creativeStrategyFilter;
  const groups = fbApiCreativeGroups()

    .sort((a, b) => b.spend - a.spend);
  countEl.textContent = `${groups.length.toLocaleString('pt-BR')} criativos únicos`;

  const maxCTR = Math.max(0.01, ...groups.map(fbMetricCTR));

  tbody.innerHTML = groups.map(g => {
    const leads = fbApiLeadsForCreativeGroup(g);
    const cpl = leads > 0 ? (g.spend / leads) : null;
    const ctr = fbMetricCTR(g);

    return `<tr>
      <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;">${esc(g.name)}</td>
      <td>${[...g.tags].map(t => `<span class="pd-utm-tag campaign" style="margin-right:3px;">${esc(t)}</span>`).join('')}</td>

      </td>
      <td style="font-family:'DM Mono',monospace">R$ ${fbMetricCPM(g).toFixed(2)}</td>
      <td>${g.impressions.toLocaleString('pt-BR')}</td>
      <td>${g.reach.toLocaleString('pt-BR')}</td>
      <td>${g.clicks.toLocaleString('pt-BR')}</td>

      <td style="font-family:'DM Mono',monospace">${cpl !== null ? 'R$ ' + cpl.toFixed(2).replace('.', ',') : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="12" class="pd-empty">Nenhum criativo encontrado para esse filtro.</td></tr>`;

function fbApiRenderHierarchy() {
  const cont = document.getElementById('fbApiHierarchy');
  const countEl = document.getElementById('fbApiTreeCount');
  if (!cont) return;

  const tree = fbApiBuildTree();
  countEl.textContent = `${tree.length} campanhas · ${FB.filteredAdsets.length} conjuntos · ${FB.filteredAds.length} anúncios`;

  if (!tree.length) {
    cont.innerHTML = `<div class="fbtree-empty">Nenhuma campanha encontrada para esse filtro.</div>`;
    return;
  }

  // Na primeira renderização (nada expandido ainda), abre a campanha de maior
  // investimento (índice 0, já que a árvore vem ordenada por investimento) como
  // exemplo, pra deixar óbvio que a árvore é clicável.
  if (FB.expanded.size === 0) {
    FB.expanded.add('c:0');
  }

  // Maior CTR entre todos os níveis carregados, pra escalar as barrinhas de CTR.
  const allCTRs = [
    ...FB.filtered.map(fbMetricCTR),
    ...FB.filteredAdsets.map(fbMetricCTR),
    ...FB.filteredAds.map(fbMetricCTR),
  ];
  const maxCTR = Math.max(0.01, ...allCTRs);

  function numCell(c) {
    const ctr = fbMetricCTR(c);
    const ctrPct = Math.min(100, Math.round((ctr / maxCTR) * 100));
    return `
      <span class="fbtree-num">R$ ${c.spend.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
      <div>
        <span class="fbtree-num">${ctr.toFixed(2)}%</span>
        <div class="fbtree-bar-track"><div class="fbtree-bar-fill" style="width:${ctrPct}%"></div></div>
      </div>
      <span class="fbtree-num">R$ ${fbMetricCPM(c).toFixed(2)}</span>
      <span class="fbtree-num">${c.impressions.toLocaleString('pt-BR')}</span>
      <span class="fbtree-num">${c.reach.toLocaleString('pt-BR')}</span>
      <span class="fbtree-num">${c.clicks.toLocaleString('pt-BR')}</span>
    `;
  }

  let html = '';
  tree.forEach((camp, ci) => {
    const campKey = 'c:' + ci;
    const campOpen = FB.expanded.has(campKey);
    const leads = fbApiLeadsForCampaign(camp);
    const cpl = leads > 0 ? (camp.spend / leads) : null;

    html += `
      <div class="fbtree-cols fbtree-row lvl-0">
        <div class="fbtree-name-cell">
          <span class="fbtree-toggle ${camp._adsets.length ? '' : 'leaf'}" onclick="fbApiToggleNode('${campKey}')">${camp._adsets.length ? (campOpen ? '▾' : '▸') : ''}</span>
          <span class="fbtree-badge camp">CAMP</span>
          <span class="fbtree-name-text" title="${esc(camp.name)}" onclick="fbApiToggleNode('${campKey}')">${esc(camp.name)} <span style="color:var(--ink-4);font-weight:400;">(${esc(camp.unit)})</span></span>
        </div>
        ${numCell(camp)}
        <span class="fbtree-num">${leads}</span>
        <span class="fbtree-num">${cpl !== null ? 'R$ ' + cpl.toFixed(2).replace('.', ',') : '—'}</span>
      </div>
    `;

    if (!campOpen) return;

    camp._adsets.forEach((adset, si) => {
      const setKey = 's:' + ci + ':' + si;
      const setOpen = FB.expanded.has(setKey);

      html += `
        <div class="fbtree-cols fbtree-row lvl-1">
          <div class="fbtree-name-cell" style="padding-left:22px;">
            <span class="fbtree-toggle ${adset._ads.length ? '' : 'leaf'}" onclick="fbApiToggleNode('${setKey}')">${adset._ads.length ? (setOpen ? '▾' : '▸') : ''}</span>
            <span class="fbtree-badge set">CONJ</span>
            <span class="fbtree-name-text" title="${esc(adset.name)}" onclick="fbApiToggleNode('${setKey}')">${esc(adset.name)}</span>
          </div>
          ${numCell(adset)}
          <span class="fbtree-num" style="color:var(--ink-4)">—</span>
          <span class="fbtree-num" style="color:var(--ink-4)">—</span>
        </div>
      `;

      if (!setOpen) return;

      adset._ads.forEach(ad => {
        const adLeads = fbApiLeadsForAd(ad);
        const adCpl = adLeads > 0 ? (ad.spend / adLeads) : null;
        html += `
          <div class="fbtree-cols fbtree-row lvl-2">
            <div class="fbtree-name-cell" style="padding-left:44px;">
              <span class="fbtree-toggle leaf"></span>
              <span class="fbtree-badge ad">AD</span>
              <span class="fbtree-name-text" title="${esc(ad.name)}">${esc(ad.name)}</span>
            </div>
            ${numCell(ad)}
            <span class="fbtree-num">${adLeads}</span>
            <span class="fbtree-num">${adCpl !== null ? 'R$ ' + adCpl.toFixed(2).replace('.', ',') : '—'}</span>
          </div>
        `;
      });
    });
  });

  cont.innerHTML = html;
}
</script>
</body>
</html>
