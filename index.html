</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Nefrostar brand — gold stays the anchor, everything else rebuilt for a dark, elevated surface */
  --gold: #C9A96E;
  --gold-light: rgba(201,169,110,0.14);
  --gold-mid: #E3C896;
  --gold-dim: rgba(201,169,110,0.09);
  --gold-dim2: rgba(201,169,110,0.34);
  --ink: #EDECE6;
  --ink-2: #B9B7AE;
  --ink-3: #8C8A81;
  --ink-4: #5B5950;
  --bg: #0B0C10;
  --surface: #15171D;
  --surface2: #1C1F27;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --shadow: 0 1px 0 rgba(255,255,255,0.045) inset, 0 12px 28px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.35);
  --ok: #34D399; --ok-bg: rgba(52,211,153,0.14);
  --warn: #FBBF24; --warn-bg: rgba(251,191,36,0.14);
  --bad: #F87171; --bad-bg: rgba(248,113,113,0.14);
  --radius: 8px;
  --radius-lg: 16px;
  /* Google/Meta platform colors */
  --g: #4CA8FF; --g-light: rgba(76,168,255,0.14);
  --m: #6E7CF6; --m-light: rgba(110,124,246,0.14);
}

body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; }

/* Scrollbar discreta, no tom do tema escuro */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim2); }
* { scrollbar-color: var(--border-strong) transparent; scrollbar-width: thin; }

/* ── TOP BAR ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
}
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { height: 28px; width: auto; filter: brightness(0) invert(1); opacity: .92; }
.brand-sep { width: 1px; height: 20px; background: var(--border-strong); }
.brand-name { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface);
  color: var(--ink-2); transition: all 0.15s; font-family: inherit;
}
.btn:hover { background: var(--surface2); border-color: var(--gold); }
.btn-gold { background: var(--gold); color: var(--bg); border-color: var(--gold); }
.btn-gold:hover { background: var(--gold-mid); border-color: var(--gold-mid); }
.btn svg { width: 13px; height: 13px; }

/* ── PAGE NAV ── */
.page-nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex;
  position: sticky; top: 56px; z-index: 90;
}
.page-nav-tab {
  padding: 15px 22px; font-size: 12px; font-weight: 600; letter-spacing: .05em;
  text-transform: uppercase; color: var(--ink-4);
  border: none; background: transparent; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  font-family: inherit; transition: all 0.15s;
  display: flex; align-items: center; gap: 7px;
}
.page-nav-tab svg { width: 14px; height: 14px; }
.page-nav-tab.active { color: var(--ink); border-bottom-color: var(--gold); }
.page-nav-tab:hover:not(.active) { color: var(--ink-2); }

/* ── LAYOUT ── */
.main { max-width: 1280px; margin: 0 auto; padding: 28px 32px 56px; }
.page-hidden { display: none !important; }

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-4); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content:""; flex: 1; height: 1px; background: var(--border); }

/* ── GENERIC CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow);
}

/* ── DASHBOARD PAGE ── */
.view-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px; width: fit-content; }
.view-tab { padding: 6px 16px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing:.04em; text-transform:uppercase; cursor: pointer; border: none; background: transparent; color: var(--ink-4); transition: all 0.15s; font-family: inherit; }
.view-tab.active { background: var(--gold); color: var(--bg); }
.month-selector { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--ink-3); }
select { padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border-strong); font-size: 12px; font-family: "DM Sans", sans-serif; background: var(--surface); color: var(--ink); cursor: pointer; outline: none; }

.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.metric-card { padding: 20px; }
.metric-label { font-size: 10px; font-weight: 700; letter-spacing:.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; }
.metric-value { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; line-height: 1; margin-bottom: 6px; font-family: "DM Mono", monospace; }
.metric-sub { font-size: 11px; color: var(--ink-4); }

.platforms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.platform-card { padding: 24px; }
.platform-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.platform-id { display: flex; align-items: center; gap: 10px; }
.platform-badge { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.platform-badge svg { width: 16px; height: 16px; }
.google-badge { background: var(--g-light); }
.meta-badge { background: var(--m-light); }
.platform-card-name { font-size: 14px; font-weight: 600; }
.platform-card-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.status-pill { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .04em; text-transform: uppercase; }
.pill-ok { background: var(--ok-bg); color: var(--ok); }
.pill-warn { background: var(--warn-bg); color: var(--warn); }
.pill-over { background: var(--bad-bg); color: var(--bad); }

.prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-3); margin-bottom: 6px; }
.prog-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
.google-fill { background: var(--g); }
.meta-fill { background: var(--m); }

.sub-list { display: flex; flex-direction: column; gap: 8px; }
.sub-item { background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; }
.sub-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.sub-name { font-size: 11px; font-weight: 500; color: var(--ink-2); }
.sub-pct { font-size: 11px; font-weight: 700; font-family: "DM Mono", monospace; }
.sub-vals { display: flex; justify-content: space-between; font-size: 10px; color: var(--ink-3); margin-bottom: 4px; }
.sub-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.sub-fill { height: 100%; border-radius: 99px; }

.chart-card { padding: 24px; margin-bottom: 24px; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.chart-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-3); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }
.chart-container { position: relative; height: 220px; }
.chart-filter { display: flex; gap: 4px; }

  <div class="modal">
    <div class="modal-header"><span class="modal-title">Editar metas anuais</span><button class="modal-close" onclick="closeModal('goalsModal')">×</button></div>

    <div class="modal-footer"><button class="btn" onclick="closeModal('goalsModal')">Cancelar</button><button class="btn btn-gold" onclick="saveGoals()">Salvar</button></div>
  </div>
</div>

<!-- MODAL RESULTADOS -->
<div class="modal-overlay" id="resultsModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Lançar resultados realizados</span><button class="modal-close" onclick="closeModal('resultsModal')">×</button></div>
    <div class="modal-body" id="resultsModalBody"></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal('resultsModal')">Cancelar</button><button class="btn btn-gold" onclick="saveResults()">Salvar</button></div>

<script>
// Tema escuro: cor/borda padrão do Chart.js pra qualquer eixo, legenda ou grid
// que não define a própria cor explicitamente (o default da lib é cinza-escuro
// '#666', pensado pra fundo claro — ficaria quase invisível no fundo escuro novo).
if (window.Chart) {
  Chart.defaults.color = '#9C9A90';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.08)';
  Chart.defaults.font.family = "'DM Sans', sans-serif";
}

const MONTHS = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

// ── STATE ──
let state = {
  currentPage: "dashboard",
  currentView: "all",
  currentMonth: 3,
  chartMode: "acumulado",
  editResultsMonth: 3,
  platforms: {
    google: { name:"Google Ads", color:"var(--g)", colorLight:"var(--g-light)", budgetAnual:30000,
      campaigns: [{name:"Google Diálise",budgetAnual:20000},{name:"Consultório Google",budgetAnual:10000}] },
    meta:   { name:"Meta Ads",   color:"var(--m)", colorLight:"var(--m-light)", budgetAnual:72000,
      campaigns: [{name:"Meta Diálise",budgetAnual:60000},{name:"Consultório Meta",budgetAnual:12000}] }
  },
  results: {
    google: [1666.67,1820,1950,2100,0,0,0,0,0,0,0,0],
    meta:   [5000,5200,4800,5400,0,0,0,0,0,0,0,0],
    googleCamp: [[1000,1100,1200,1300,0,0,0,0,0,0,0,0],[666.67,720,750,800,0,0,0,0,0,0,0,0]],
    metaCamp:   [[4000,4200,3800,4400,0,0,0,0,0,0,0,0],[1000,1000,1000,1000,0,0,0,0,0,0,0,0]]
  }
};

// ── HELPERS ──
function fmt(v){ return "R$ "+v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtK(v){ return v>=1000?"R$ "+(v/1000).toFixed(1).replace(".",",")+" k":fmt(v); }
function pctOf(r,m){ return m?Math.round(r/m*100):0; }
function pillClass(p){ return p>105?"pill-over":p<80?"pill-warn":"pill-ok"; }
function pillText(p){ return p>105?"Acima "+p+"%":p<80?"Abaixo "+p+"%":"No alvo "+p+"%"; }
function monthlyBudget(pl){ return state.platforms[pl].budgetAnual/12; }
function accBudget(pl,m){ return monthlyBudget(pl)*(m+1); }
function accReal(pl,m){ return state.results[pl].slice(0,m+1).reduce((a,b)=>a+b,0); }
function campMonthly(pl,i){ return state.platforms[pl].campaigns[i].budgetAnual/12; }

// ── DASHBOARD ──
function renderMetrics(){
  const m=state.currentMonth, v=state.currentView;
  const sg=v==="all"||v==="google", sm=v==="all"||v==="meta";
  const rg=sg?accReal("google",m):0, rm=sm?accReal("meta",m):0;
  const og=sg?accBudget("google",m):0, om=sm?accBudget("meta",m):0;
  const ag=sg?state.platforms.google.budgetAnual:0, am=sm?state.platforms.meta.budgetAnual:0;
  const rt=rg+rm, ot=og+om, at=ag+am, p=pctOf(rt,ot);
  const pColor=p>105?"var(--bad)":p<80?"var(--warn)":"var(--ok)";
  document.getElementById("metricsGrid").innerHTML=`
    <div class="card metric-card"><div class="metric-label">Investido até ${MONTH_NAMES[m]}</div><div class="metric-value">${fmt(rt)}</div><div class="metric-sub">acumulado do ano</div></div>
    <div class="card metric-card"><div class="metric-label">Orçado até ${MONTH_NAMES[m]}</div><div class="metric-value">${fmt(ot)}</div><div class="metric-sub">previsto no período</div></div>
    <div class="card metric-card"><div class="metric-label">Budget anual total</div><div class="metric-value">${fmt(at)}</div><div class="metric-sub">meta do ano</div></div>
    <div class="card metric-card"><div class="metric-label">Aproveitamento</div><div class="metric-value" style="color:${pColor}">${p}%</div><div class="metric-sub">${fmt(at-rt)} restante no ano</div></div>
  `;
}
function renderPlatforms(){
  const m=state.currentMonth, v=state.currentView;
  const keys=["google","meta"].filter(k=>v==="all"||v===k);
  let html="";
  for(const key of keys){
    const p=state.platforms[key], real=accReal(key,m), orc=accBudget(key,m), pct=pctOf(real,orc);
    const campRes=key==="google"?state.results.googleCamp:state.results.metaCamp;
    const logoSVG=key==="google"
      ?`<svg viewBox="0 0 24 24" fill="none"><path d="M12 11h8.5M20.5 12A8.5 8.5 0 1112 3.5" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/></svg>`
      :`<svg viewBox="0 0 24 24" fill="none"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" stroke="#0866FF" stroke-width="2" stroke-linejoin="round"/></svg>`;
    const subs=p.campaigns.map((c,i)=>{
      const cr=campRes[i].slice(0,m+1).reduce((a,b)=>a+b,0), co=campMonthly(key,i)*(m+1), cp=pctOf(cr,co);
      return `<div class="sub-item"><div class="sub-top"><span class="sub-name">${c.name}</span><span class="sub-pct" style="color:${key==="google"?"var(--g)":"var(--m)"}">${cp}%</span></div><div class="sub-vals"><span>${fmt(cr)}</span><span>de ${fmt(co)}</span></div><div class="sub-track"><div class="sub-fill ${key}-fill" style="width:${Math.min(cp,100)}%"></div></div></div>`;
    }).join("");
    html+=`<div class="card platform-card"><div class="platform-card-header"><div class="platform-id"><div class="platform-badge ${key}-badge">${logoSVG}</div><div><div class="platform-card-name">${p.name}</div><div class="platform-card-sub">Budget anual: ${fmt(p.budgetAnual)}</div></div></div><span class="status-pill ${pillClass(pct)}">${pillText(pct)}</span></div><div class="prog-row"><span>Realizado: ${fmt(real)}</span><span>Orçado: ${fmt(orc)}</span></div><div class="prog-track"><div class="prog-fill ${key}-fill" style="width:${Math.min(pct,100)}%"></div></div><div class="sub-list">${subs}</div></div>`;
  }
  if(keys.length===1) html+="<div></div>";
  document.getElementById("platformsGrid").innerHTML=html;
}
let chartInst=null;
function renderChart(){
  const m=state.currentMonth, v=state.currentView, acc=state.chartMode==="acumulado";
  const sg=v==="all"||v==="google", sm=v==="all"||v==="meta";
  const datasets=[];
  if(sg){
    datasets.push({data:MONTHS.map((_,i)=>+(acc?accBudget("google",i):monthlyBudget("google")).toFixed(2)),backgroundColor:"rgba(26,115,232,0.15)",borderColor:"rgba(26,115,232,0.3)",borderWidth:1});
    datasets.push({data:MONTHS.map((_,i)=>i<=m?+(acc?accReal("google",i):state.results.google[i]).toFixed(2):null),backgroundColor:"#1a73e8",borderColor:"#1a73e8",borderWidth:1});
  }
  if(sm){
    datasets.push({data:MONTHS.map((_,i)=>+(acc?accBudget("meta",i):monthlyBudget("meta")).toFixed(2)),backgroundColor:"rgba(8,102,255,0.1)",borderColor:"rgba(8,102,255,0.25)",borderWidth:1});
    datasets.push({data:MONTHS.map((_,i)=>i<=m?+(acc?accReal("meta",i):state.results.meta[i]).toFixed(2):null),backgroundColor:"#0866FF",borderColor:"#0866FF",borderWidth:1});
  }
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(document.getElementById("mainChart"),{type:"bar",data:{labels:MONTHS,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+fmt(ctx.raw||0)}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:"rgba(255,255,255,0.07)"},ticks:{font:{size:10},callback:v=>fmtK(v)}}}}});
}

// ── GOALS MODAL ──
function openGoalsModal(){
  const body=document.getElementById("goalsModalBody");
  const buildRows=(key,p)=>p.campaigns.map((c,i)=>`
    <div class="sub-form-row">
      <div class="form-group"><label class="form-label">${i===0?"Campanha":""}</label><input class="form-input" id="${key}-cn-${i}" value="${c.name}"></div>
      <div class="form-group"><label class="form-label">${i===0?"Budget anual":""}</label><input class="form-input" id="${key}-cb-${i}" type="number" value="${c.budgetAnual}" oninput="rcM('${key}',${i});rcT('${key}')"></div>
      <div class="form-group"><label class="form-label">${i===0?"Mensal est.":""}</label><input class="form-input" id="${key}-cm-${i}" type="number" value="${(c.budgetAnual/12).toFixed(2)}" readonly style="opacity:.5"></div>
    </div>`).join("");
  body.innerHTML=["google","meta"].map(key=>{
    const p=state.platforms[key];
    return `<div class="platform-section"><div class="platform-section-header ${key}-header">${p.name}</div><div class="platform-section-body">
      <div class="form-group"><label class="form-label">Total calculado</label><input class="form-input" id="${key}-total" value="${p.budgetAnual}" readonly style="opacity:.5"></div>
      ${buildRows(key,p)}
      <button class="btn" style="width:fit-content;font-size:11px;" onclick="addCamp('${key}')">+ Campanha</button>
    </div></div>`;
  }).join("");
  document.getElementById("goalsModal").classList.add("open");
}
function rcM(key,i){ const b=parseFloat(document.getElementById(key+"-cb-"+i)?.value||0); const el=document.getElementById(key+"-cm-"+i); if(el) el.value=(b/12).toFixed(2); }
function rcT(key){ let t=0; state.platforms[key].campaigns.forEach((_,i)=>{ t+=parseFloat(document.getElementById(key+"-cb-"+i)?.value||0); }); const el=document.getElementById(key+"-total"); if(el) el.value=t.toFixed(2); }
function addCamp(key){ state.platforms[key].campaigns.push({name:"Nova campanha",budgetAnual:0}); state.results[key==="google"?"googleCamp":"metaCamp"].push(new Array(12).fill(0)); openGoalsModal(); }
function saveGoals(){ ["google","meta"].forEach(key=>{ const p=state.platforms[key]; let t=0; p.campaigns.forEach((c,i)=>{ c.name=document.getElementById(key+"-cn-"+i)?.value||c.name; c.budgetAnual=parseFloat(document.getElementById(key+"-cb-"+i)?.value||c.budgetAnual); t+=c.budgetAnual; }); p.budgetAnual=t; }); closeModal("goalsModal"); renderAll(); }

// ── RESULTS MODAL ──
function openResultsModal(){ state.editResultsMonth=state.currentMonth; renderResultsModal(); document.getElementById("resultsModal").classList.add("open"); }
function renderResultsModal(){
  const m=state.editResultsMonth;
  const tabs=MONTH_NAMES.map((n,i)=>`<button class="month-tab ${i===m?"active":""}" onclick="swRM(${i})">${n.substring(0,3)}</button>`).join("");
  const bldF=(key,ck)=>state.platforms[key].campaigns.map((c,i)=>`<div class="result-field"><label>${c.name}</label><input id="res-${key}-${i}" type="number" value="${(state.results[ck][i][m]||0).toFixed(2)}" step="0.01" oninput="rcRT('${key}')"></div>`).join("");
  document.getElementById("resultsModalBody").innerHTML=`
    <div class="months-tabs">${tabs}</div>
    <div class="results-grid">
      <div class="result-card"><div class="result-card-header google-result-header">Google Ads — ${MONTH_NAMES[m]}</div><div class="result-card-body"><div class="result-field"><label>Total (auto)</label><input id="res-google-total" readonly style="opacity:.5" value="${(state.results.google[m]||0).toFixed(2)}"></div>${bldF("google","googleCamp")}</div></div>
      <div class="result-card"><div class="result-card-header meta-result-header">Meta Ads — ${MONTH_NAMES[m]}</div><div class="result-card-body"><div class="result-field"><label>Total (auto)</label><input id="res-meta-total" readonly style="opacity:.5" value="${(state.results.meta[m]||0).toFixed(2)}"></div>${bldF("meta","metaCamp")}</div></div>
    </div>`;
}
function rcRT(key){ let t=0; state.platforms[key].campaigns.forEach((_,i)=>{ t+=parseFloat(document.getElementById("res-"+key+"-"+i)?.value||0); }); const el=document.getElementById("res-"+key+"-total"); if(el) el.value=t.toFixed(2); }
function swRM(m){ state.editResultsMonth=m; renderResultsModal(); }
function saveResults(){
  const m=state.editResultsMonth;
  ["google","meta"].forEach(key=>{ const ck=key==="google"?"googleCamp":"metaCamp"; let t=0; state.platforms[key].campaigns.forEach((_,i)=>{ const v=parseFloat(document.getElementById("res-"+key+"-"+i)?.value||0); state.results[ck][i][m]=v; t+=v; }); state.results[key][m]=t; });
  closeModal("resultsModal"); renderAll();
}

// ── PAGE NAV ──
function setPage(page,el){
  document.querySelectorAll(".page-nav-tab").forEach(t=>t.classList.remove("active")); el.classList.add("active");
  ["dashboard","metaano","fbads","pipedrive","metaapi"].forEach(p=>{ const el=document.getElementById(p+"Page"); if(el){ if(p===page) el.classList.remove("page-hidden"); else el.classList.add("page-hidden"); } });
  state.currentPage=page;
  if(page==="metaano") renderGoalPage();
  if(page==="fbads") renderFbPage();
  if(page==="pipedrive") pdInit();
  if(page==="metaapi" && !FB.loaded) fbApiInit();
}

// ── META DO ANO ──
let donutChart=null;
function renderGoalPage(){
  const anual=state.platforms.google.budgetAnual+state.platforms.meta.budgetAnual;
  const real=state.results.google.reduce((a,b)=>a+b,0)+state.results.meta.reduce((a,b)=>a+b,0);
  const pct=Math.min(Math.round(real/anual*100),999);
  const restante=anual-real;
  const mDec=state.results.google.filter(v=>v>0).length||1;
  const media=real/mDec;
  const proj=real+media*(12-mDec);
  const pColor=pct>105?"var(--bad)":pct<80?"var(--warn)":"var(--ok)";
  const m=state.currentMonth;
  const container=document.getElementById("goalMain");
  container.innerHTML=`
    <div class="goal-hero card">
      <div><div class="donut-wrap"><canvas class="donut-canvas" id="donutCanvas"></canvas><div class="donut-center"><div class="donut-pct" style="color:${pColor}">${pct}%</div><div class="donut-label">da meta anual</div></div></div></div>
      <div class="goal-stats">
        <div><div class="goal-stat-label"><span>Investido no ano</span><span class="status-pill ${pillClass(pct)}">${pillText(pct)}</span></div><div class="goal-stat-value">${fmt(real)}</div><div class="goal-stat-sub">de ${fmt(anual)} meta anual total</div></div>
        <div class="goal-divider"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div><div class="goal-stat-label">Restante</div><div class="goal-stat-value" style="font-size:20px">${fmt(restante)}</div><div class="goal-stat-sub">para 100% da meta</div></div>
          <div><div class="goal-stat-label">Média mensal</div><div class="goal-stat-value" style="font-size:20px">${fmt(media)}</div><div class="goal-stat-sub">nos ${mDec} meses realizados</div></div>
        </div>
        <div class="goal-projection"><div><div class="goal-projection-label">Projeção anual no ritmo atual</div><div class="goal-projection-sub">baseado na média dos meses realizados</div></div><div class="goal-projection-value">${fmt(proj)}</div></div>
      </div>
    </div>
    <div class="sec-label" style="margin-bottom:14px;">Por plataforma</div>
    <div class="goal-breakdown">${["google","meta"].map(k=>bldPlatGoal(k)).join("")}</div>
    <div class="goal-table-card">
      <div class="sec-label" style="margin-bottom:18px;">Acompanhamento mês a mês</div>
      <table class="gtable"><thead><tr><th>Mês</th><th>Google</th><th>Meta</th><th>Total mês</th><th>Meta mensal</th><th>% meta</th><th>Acumulado</th><th>% anual</th></tr></thead><tbody id="gtbody"></tbody></table>
    </div>`;
  if(donutChart) donutChart.destroy();
  donutChart=new Chart(document.getElementById("donutCanvas"),{type:"doughnut",data:{datasets:[{data:[real,Math.max(restante,0)],backgroundColor:[pct>105?"#8a2020":pct<80?"#8a5200":"#C9A96E","rgba(0,0,0,0.07)"],borderWidth:0,hoverOffset:0}]},options:{responsive:false,cutout:"74%",plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{animateRotate:true,duration:700}}});
  const metaM=anual/12; let acc=0;
  document.getElementById("gtbody").innerHTML=MONTH_NAMES.map((name,i)=>{
    const g=state.results.google[i], mt=state.results.meta[i], tot=g+mt, fut=tot===0&&i>m;
    acc+=tot; const p=fut?null:Math.round(tot/metaM*100), pA=fut?null:Math.round(acc/anual*100);
    const pCls=p===null?"td-future":p>105?"td-over":p<80?"td-warn":"td-ok";
    const bW=fut?0:Math.min(p,100)*0.45; const bC=p===null?"#ccc":p>105?"#8a2020":p<80?"#8a5200":"#C9A96E";
    return `<tr class="${i===m?"cur-month":""}"><td>${name}${i===m?" ●":""}</td><td>${fut?"—":fmt(g)}</td><td>${fut?"—":fmt(mt)}</td><td>${fut?"—":fmt(tot)}</td><td>${fmt(metaM)}</td><td class="${pCls}">${fut?"—":`<span class="pace-bar" style="width:${bW}px;background:${bC}"></span>${p}%`}</td><td>${fut?"—":fmt(acc)}</td><td class="${pA===null?"td-future":pA>=100?"td-ok":""}">${pA===null?"—":pA+"%"}</td></tr>`;
  }).join("")+`<tr><td style="font-weight:700">Total</td><td>${fmt(state.results.google.reduce((a,b)=>a+b,0))}</td><td>${fmt(state.results.meta.reduce((a,b)=>a+b,0))}</td><td>${fmt(real)}</td><td>${fmt(anual)}</td><td class="${pct>105?"td-over":pct<80?"td-warn":"td-ok"}">${pct}%</td><td>${fmt(real)}</td><td class="${pct>=100?"td-ok":""}">${pct}%</td></tr>`;
}
function bldPlatGoal(key){
  const p=state.platforms[key], real=state.results[key].reduce((a,b)=>a+b,0), pct=Math.min(Math.round(real/p.budgetAnual*100),999);
  const fillColor=key==="google"?"var(--g)":"var(--m)";
  const campKey=key==="google"?"googleCamp":"metaCamp";
  const subs=p.campaigns.map((c,i)=>{ const cr=state.results[campKey][i].reduce((a,b)=>a+b,0), cp=Math.min(Math.round(cr/c.budgetAnual*100),999); return `<div class="sub-item"><div class="sub-top"><span class="sub-name">${c.name}</span><span class="sub-pct" style="color:${fillColor}">${cp}%</span></div><div class="sub-vals"><span>${fmt(cr)}</span><span>de ${fmt(c.budgetAnual)}</span></div><div class="sub-track"><div class="sub-fill" style="width:${Math.min(cp,100)}%;background:${fillColor}"></div></div></div>`; }).join("");
  const logoSVG=key==="google"?`<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M12 11h8.5M20.5 12A8.5 8.5 0 1112 3.5" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/></svg>`:`<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" stroke="#0866FF" stroke-width="2" stroke-linejoin="round"/></svg>`;
  return `<div class="goal-platform-card"><div class="gpc-header"><div class="gpc-name"><div class="platform-badge ${key}-badge" style="width:26px;height:26px">${logoSVG}</div>${p.name}</div><span class="gpc-anual">Meta: ${fmt(p.budgetAnual)}</span></div><div class="big-prog-label"><span style="font-family:'DM Mono',monospace;font-size:18px">${fmt(real)}</span><span style="color:${pct>105?"var(--bad)":pct<80?"var(--warn)":"var(--ok)"};font-weight:700">${pct}%</span></div><div class="big-prog-track"><div class="big-prog-fill" style="width:${Math.min(pct,100)}%;background:${fillColor}"></div></div><div class="big-prog-sub"><span>${fmt(Math.max(p.budgetAnual-real,0))} restante</span><span>de ${fmt(p.budgetAnual)}</span></div>${subs}</div>`;
}

// ── FACEBOOK ADS PAGE ──
const FB_METRICS=[
  {key:"investimento",  label:"Investimento",   fmt:"money", color:"var(--ink)",    hib:null},
  {key:"alcance",       label:"Alcance",        fmt:"num",   color:"#7c3aed",       hib:true},
  {key:"impressao",     label:"Impressão",      fmt:"num",   color:"#0891b2",       hib:true},
  {key:"frequencia",    label:"Frequência",     fmt:"dec",   color:"#b45309",       hib:null},
  {key:"cliques",       label:"Cliques",        fmt:"num",   color:"#2d7a45",       hib:true},
  {key:"ctr",           label:"CTR",            fmt:"pct",   color:"#991b1b",       hib:true},
  {key:"cpc",           label:"CPC",            fmt:"money", color:"#c2410c",       hib:false},
  {key:"pageview",      label:"Pageview",       fmt:"num",   color:"#4338ca",       hib:true},
  {key:"custoPageview", label:"Custo Pageview", fmt:"money", color:"#be185d",       hib:false},
  {key:"leads",         label:"Leads",          fmt:"num",   color:"#0f766e",       hib:true},
  {key:"cpl",           label:"CPL",            fmt:"money", color:"#4d7c0f",       hib:false},
  // ── Novas métricas CRM ──
  {key:"leadsCrm",      label:"Leads CRM",      fmt:"num",   color:"#0369a1",       hib:true},
  {key:"cplCrm",        label:"CPL CRM",        fmt:"money", color:"#0e7490",       hib:false},
  {key:"taxaConv",      label:"Taxa Conversão",  fmt:"pct",   color:"#7e22ce",       hib:true},
];
function e12(){ return new Array(12).fill(0); }

// Métricas calculadas (não simples somas)
const AVG_METRICS = new Set(["frequencia","ctr","cpc","custoPageview","cpl","cplCrm","taxaConv"]);
const DERIVED_METRICS = new Set(["ctr","cpc","cpl","custoPageview","cplCrm","taxaConv"]);

// Paleta de cores por ano para comparação
const YEAR_PALETTE = {
  2022:{ solid:'#6b7280', light:'#6b728020' },
  2023:{ solid:'#b45309', light:'#b4530920' },
  2024:{ solid:'#1a73e8', light:'#1a73e820' },
  2025:{ solid:'#7c3aed', light:'#7c3aed20' },
  2026:{ solid:'#C9A96E', light:'#C9A96E20' },
  2027:{ solid:'#0f766e', light:'#0f766e20' },
};
function yearColor(yr){ return YEAR_PALETTE[yr]||{solid:'#555',light:'#55555520'}; }


// fbState com suporte a múltiplos anos por unidade
let fbState={
  activeChannel:"brasilia",
  activeYear: 2026,
  compareMode: false,
  channels:{
    brasilia:{ name:"Brasília", color:"#C9A96E", years:{} },
    morumbi:    { name:"Morumbi — SP",    color:"#1a73e8", years:{} },
    alphaville: { name:"Alphaville — SP", color:"#0f766e", years:{} }
  }
};
let fbCharts={};

function fbChObj(){ return fbState.channels[fbState.activeChannel]; }
function fbYears(){ return Object.keys(fbChObj().years||{}).map(Number).sort((a,b)=>b-a); }
function fbYear(){
  const yrs=fbYears();
  if(!yrs.length) return fbState.activeYear;
  return yrs.includes(fbState.activeYear)?fbState.activeYear:yrs[0];
}
function fbAD(){
  const y=fbYear(), ch=fbChObj();
  if(!ch.years) ch.years={};
  if(!ch.years[y]) ch.years[y]=Object.fromEntries(FB_METRICS.map(m=>[m.key,e12()]));
  return ch.years[y];
}
function fbFilled(){ return fbAD().investimento.map((v,i)=>v>0?i:-1).filter(i=>i>=0); }
function fbDelta(key){
  const d=fbAD(), f=fbFilled();
  if(f.length<2) return null;
  const last=d[key][f[f.length-1]], prev=d[key][f[f.length-2]];
  if(!prev) return null;
  return (last-prev)/prev*100;
}

function fmtFb(v, type){
  if(v===null||v===undefined||isNaN(v)) return "—";
  const n=parseFloat(v); if(isNaN(n)) return "—";
  switch(type){
    case "money": return "R$ "+n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    case "pct":   return n.toFixed(2).replace(".",",")+"%";
    case "dec":   return n.toFixed(2).replace(".",",");
    case "num":   return Math.round(n).toLocaleString("pt-BR");
    default:      return String(n);
  }
}

function calcSummary(key, filledIdx, data){
  if(!filledIdx.length) return null;
  if(key==="cpc"){
    const inv=filledIdx.map(i=>data.investimento[i]||0).reduce((a,b)=>a+b,0);
    const clk=filledIdx.map(i=>data.cliques[i]||0).reduce((a,b)=>a+b,0);
    return clk>0?inv/clk:null;
  }
  if(key==="cpl"){
    const inv=filledIdx.map(i=>data.investimento[i]||0).reduce((a,b)=>a+b,0);
    const lds=filledIdx.map(i=>data.leads[i]||0).reduce((a,b)=>a+b,0);
    return lds>0?inv/lds:null;
  }
  if(key==="ctr"){
    const clk=filledIdx.map(i=>data.cliques[i]||0).reduce((a,b)=>a+b,0);
    const imp=filledIdx.map(i=>data.impressao[i]||0).reduce((a,b)=>a+b,0);
    return imp>0?(clk/imp)*100:null;
  }
  if(key==="custoPageview"){
    const inv=filledIdx.map(i=>data.investimento[i]||0).reduce((a,b)=>a+b,0);
    const pv=filledIdx.map(i=>data.pageview[i]||0).reduce((a,b)=>a+b,0);
    return pv>0?inv/pv:null;
  }
  if(key==="cplCrm"){
    const inv=filledIdx.map(i=>data.investimento[i]||0).reduce((a,b)=>a+b,0);
    const lcrm=filledIdx.map(i=>(data.leadsCrm||[])[i]||0).reduce((a,b)=>a+b,0);
    return lcrm>0?inv/lcrm:null;
  }
  if(key==="taxaConv"){
    const lds=filledIdx.map(i=>data.leads[i]||0).reduce((a,b)=>a+b,0);
    const lcrm=filledIdx.map(i=>(data.leadsCrm||[])[i]||0).reduce((a,b)=>a+b,0);
    return lds>0?(lcrm/lds)*100:null;
  }
  const vals=filledIdx.map(i=>data[key][i]||0).filter(v=>v>0);
  if(!vals.length) return null;
  if(AVG_METRICS.has(key)) return vals.reduce((a,b)=>a+b,0)/vals.length;
  return vals.reduce((a,b)=>a+b,0);
}

  // ── KPI CARDS ──
  const kpiKeys=["investimento","leads","cpl","ctr","cpc","alcance"];

  const isDerivedKey=k=>['cpc','cpl','ctr','custoPageview'].includes(k);

  function buildKpiSingle(key){
    const meta=FB_METRICS.find(x=>x.key===key);

    const summary=calcSummary(key,filled,d);

    const delta=(()=>{if(f.length<2)return null;const cur=isDer?calcMonthVal(key,f[f.length-1],d):(d[key][f[f.length-1]]||0);const prv=isDer?calcMonthVal(key,f[f.length-2],d):(d[key][f[f.length-2]]||0);if(!prv)return null;return(cur-prv)/prv*100;})();
    let dHTML="";
    if(delta!==null){const up=delta>=0,good=meta.hib===null?null:(up?meta.hib:!meta.hib),cls=good===null?"kpi-neutral":good?"kpi-up":"kpi-down";dHTML=`<div class="kpi-delta ${cls}">${up?"↑":"↓"} ${Math.abs(delta).toFixed(1)}% vs mês ant.</div>`;}

  function buildKpiCompare(key){
    const meta=FB_METRICS.find(x=>x.key===key);
    const isDer=isDerivedKey(key);
    const sortedYrs=yrs.slice().sort((a,b)=>a-b);
    const colItems=sortedYrs.map(y=>{
      const yd=chO.years[y]||{};

      const summary=calcSummary(key,filledY,yd);
      const c=yearColor(y);

      <div style="display:flex;gap:8px;padding:10px;">${colItems||'<div style="padding:10px;color:var(--ink-4);font-size:11px;">Sem dados</div>'}</div>
    </div>`;

  // CRM KPI strip separado
  const crmStripSingle = `
    <div style="margin-bottom:8px;">
      <div class="sec-label" style="margin-bottom:10px;">Conversão CRM</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">${crmKpiKeys.map(key=>{
        const meta=FB_METRICS.find(x=>x.key===key);
        const isDer=isDerivedKey(key);
        const val=isDer&&lastM>=0?calcMonthVal(key,lastM,d):(lastM>=0?(d[key]||[])[lastM]:null);
        const summary=calcSummary(key,filled,d);
        const isAvg=AVG_METRICS.has(key);
        const c=yearColor(yr);
        const mainVal=val!=null&&val>0?fmtFb(val,meta.fmt):"—";
        const subVal=summary!==null?fmtFb(summary,meta.fmt):"—";
        return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:18px 20px;border-top:2px solid ${meta.color};">
          <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;">${meta.label}</div>
          <div style="font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:var(--ink);">${mainVal}</div>
          <div style="font-size:10px;color:var(--ink-4);margin-top:6px;">${isAvg?"Média":"Total"} ano: ${subVal}</div>
        </div>`;
      }).join("")}</div>
    </div>`;

  const kpiStrip = cmpMode
    ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;">${kpiKeys.map(buildKpiCompare).join("")}</div>
       <div style="margin-bottom:8px;"><div class="sec-label" style="margin-bottom:10px;">Conversão CRM — Comparação</div>
       <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">${crmKpiKeys.map(buildKpiCompare).join("")}</div></div>`
    : `<div class="kpi-strip">${kpiKeys.map(buildKpiSingle).join("")}</div>${crmStripSingle}`;

  // ── HTML da página ──
  document.getElementById("fbMain").innerHTML=`
    <div class="fb-channel-tabs">${chTabs}<div class="fb-period-badge" style="display:flex;align-items:center;gap:6px;">${periodLabel}${yearSel}${cmpBtn}
      ${!cmpMode&&filled.length?`<button onclick="clearYearData()" title="Limpar dados de ${yr}" style="background:none;border:1px solid var(--border-strong);border-radius:4px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--bad);cursor:pointer;font-family:'DM Sans',sans-serif;">✕ Limpar ${yr}</button>`:''}
    </div></div>
    ${kpiStrip}
    <div class="sec-label">Investimento &amp; Leads${cmpMode?" — Comparação":" — "+yr}</div>
    <div class="fb-charts-row">
      <div class="fb-chart-card"><div class="fb-chart-title">Investimento mensal (R$)${cmpMode?" — comparação anual":" — "+yr}</div><div class="fb-chart-wrap" style="height:240px"><canvas id="fbInvChart"></canvas></div></div>
      <div class="fb-chart-card"><div class="fb-chart-title">Leads por mês${cmpMode?" — comparação anual":" — "+yr}</div><div class="fb-chart-wrap" style="height:240px"><canvas id="fbLeadChart"></canvas></div></div>

    </div>`;

  renderFbTable();
  renderFbCharts();
}

function calcMonthVal(key, mi, data){
  if(key==="cpc"){ const inv=data.investimento[mi]||0,clk=data.cliques[mi]||0; return clk>0?inv/clk:0; }
  if(key==="cpl"){ const inv=data.investimento[mi]||0,lds=data.leads[mi]||0; return lds>0?inv/lds:0; }
  if(key==="ctr"){ const clk=data.cliques[mi]||0,imp=data.impressao[mi]||0; return imp>0?(clk/imp)*100:0; }
  if(key==="custoPageview"){ const inv=data.investimento[mi]||0,pv=data.pageview[mi]||0; return pv>0?inv/pv:0; }
  // ── Novas métricas CRM ──
  if(key==="cplCrm"){ const inv=data.investimento[mi]||0,lcrm=data.leadsCrm[mi]||0; return lcrm>0?inv/lcrm:0; }
  if(key==="taxaConv"){ const lds=data.leads[mi]||0,lcrm=data.leadsCrm[mi]||0; return lds>0?(lcrm/lds)*100:0; }
  return data[key][mi]||0;
}

function renderFbTable(){
  const d=fbAD(), filled=fbFilled();
  const isDerived = k=>['cpc','cpl','ctr','custoPageview'].includes(k);
  document.getElementById("fbTblBody").innerHTML=FB_METRICS.map(meta=>{
    const isAvg=AVG_METRICS.has(meta.key);
    const vals=d[meta.key];
    const summary=calcSummary(meta.key,filled,d);
    const summaryLabel=summary!==null?fmtFb(summary,meta.fmt)+(isAvg?" (média)":" (total)"):"—";
    const step=isAvg?"0.01":"1";
    const cells=Array.from({length:12},(_,i)=>{
      const hasInv=d.investimento[i]>0||vals[i]>0;
      if(!hasInv) return `<td><input type="number" step="${step}" value="" placeholder="—" onchange="updateFbCell('${meta.key}',${i},this.value)" aria-label="${meta.label} ${MONTH_NAMES[i]}"></td>`;
      if(isDerived(meta.key)){
        const calc=calcMonthVal(meta.key,i,d);
        return `<td style="padding:10px 12px;text-align:right;font-size:12px;font-family:'DM Mono',monospace;color:var(--ink-2);">${calc>0?fmtFb(calc,meta.fmt):"—"}</td>`;
      }
      return `<td><input type="number" step="${step}" value="${vals[i]>0?vals[i]:''}" placeholder="—" onchange="updateFbCell('${meta.key}',${i},this.value)" aria-label="${meta.label} ${MONTH_NAMES[i]}"></td>`;
    }).join("");
    const lbl=isDerived(meta.key)?`${meta.label} <span style="font-size:9px;color:var(--ink-4);font-weight:400;">(auto)</span>`:meta.label;
    return `<tr class="${meta.key==="investimento"?"row-invest":""}"><td class="td-metric-name" style="border-left:3px solid ${meta.color}">${lbl}</td>${cells}<td class="td-total">${summaryLabel}</td></tr>`;
  }).join("");
}

function mkChartOpt(yFmt){
  return {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+yFmt(ctx.raw||0)}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:"rgba(255,255,255,0.06)"},ticks:{font:{size:10},callback:v=>yFmt(v)},beginAtZero:true}}};
}

  const fmtNumTip=v=>Math.round(v).toLocaleString("pt-BR");

  // ── Opções base do Chart.js ──
  const baseOpt=(axFmt,tipFmt,showLegend)=>({

        bodyFont:{size:12,family:"'DM Mono',monospace"},

      }
    },
    scales:{
      x:{grid:{display:false}, border:{display:false}, ticks:{font:{size:11,family:"'DM Sans',sans-serif"},color:'#9C9A90',maxRotation:0}},
      y:{grid:{color:"rgba(255,255,255,0.07)",drawBorder:false}, border:{display:false,dash:[4,4]},
         ticks:{font:{size:11,family:"'DM Sans',sans-serif"},color:'#9C9A90',callback:v=>axFmt(v)},
         beginAtZero:true}
    }
  });

  // ── Helper: gerar dados ──
  function getYrData(y, key, isDerived){
    const yd=chO.years[y]||{};
    return Array.from({length:12},(_,mi)=>{
      if(!(yd.investimento||[])[mi]) return null;
      return isDerived?calcMonthVal(key,mi,yd):((yd[key]||[])[mi]||0);
    });
  }

  function singleLabels(y){
    const yd=chO.years[y]||{};
    const fi=(yd.investimento||[]).map((v,i)=>v>0?i:-1).filter(i=>i>=0);
    return fi.map(i=>MONTHS[i]);
  }
  function singleData(y, key, isDerived){
    const yd=chO.years[y]||{};
    const fi=(yd.investimento||[]).map((v,i)=>v>0?i:-1).filter(i=>i>=0);
    return fi.map(i=>isDerived?calcMonthVal(key,i,yd):((yd[key]||[])[i]||0));
  }

  // ── Cores e estilo por tipo ──
  function barDs(y, vals, key){
    const c=yearColor(y);
    return {label:String(y), data:vals, backgroundColor:c.light, borderColor:c.solid,
            borderWidth:1.5, borderRadius:5, borderSkipped:false};
  }
  function lineDs(y, vals){
    const c=yearColor(y);
    return {label:String(y), data:vals, borderColor:c.solid, backgroundColor:'transparent',
            borderWidth:2.5, pointBackgroundColor:c.solid, pointBorderColor:'#fff',
            pointBorderWidth:2, pointRadius:5, pointHoverRadius:7,
            fill:false, tension:0.35, spanGaps:false};
  }

  // ── Criar chart ──
  function mkChart(id, type, key, axFmt, tipFmt, isDerived=false){
    const el=document.getElementById(id); if(!el) return;
    let labels, datasets, showLeg=cmpMode;
    if(!cmpMode){
      labels=singleLabels(yr);
      const vals=singleData(yr,key,isDerived);
      const c=yearColor(yr);
      datasets=[type==='bar'
        ? {data:vals,backgroundColor:c.light,borderColor:c.solid,borderWidth:1.5,borderRadius:5,borderSkipped:false}
        : {data:vals,borderColor:c.solid,backgroundColor:c.light,borderWidth:2.5,pointBackgroundColor:c.solid,pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35}
      ];
    } else {
      labels=MONTHS;
      datasets=sortedYrs.map(y=>type==='bar'?barDs(y,getYrData(y,key,isDerived),key):lineDs(y,getYrData(y,key,isDerived)));
    }
    return new Chart(el,{type,data:{labels,datasets},options:baseOpt(axFmt,tipFmt,showLeg)});
  }

  fbCharts.inv = mkChart("fbInvChart","bar","investimento",fmtInvAx,fmtInvTip);
  fbCharts.ld  = mkChart("fbLeadChart","bar","leads",fmtNumAx,fmtNumTip);
  fbCharts.ctr = mkChart("fbCtrChart","line","ctr",fmtPctAx,fmtPctTip,true);
  fbCharts.cpl = mkChart("fbCplChart","line","cpl",fmtMonAx,fmtMonTip,true);

  // ── Alcance vs Impressões (modo single) ou só Alcance (comparação) ──
  const rchEl=document.getElementById("fbRchChart"); if(!rchEl) return;
  if(!cmpMode){
    const fi=fbFilled(), d=fbAD(), c=yearColor(yr);
    const lbl=fi.map(i=>MONTHS[i]);
    const impDs={label:"Impressões",data:fi.map(i=>d.impressao[i]||0),backgroundColor:"rgba(8,145,178,0.12)",borderColor:"#0891b2",borderWidth:1.5,borderRadius:4,borderSkipped:false};
    const alcDs={label:"Alcance",data:fi.map(i=>d.alcance[i]||0),backgroundColor:"rgba(124,58,237,0.12)",borderColor:"#7c3aed",borderWidth:1.5,borderRadius:4,borderSkipped:false};
    fbCharts.rch=new Chart(rchEl,{type:"bar",data:{labels:lbl,datasets:[impDs,alcDs]},options:{...baseOpt(fmtNumAx,fmtNumTip,true),plugins:{legend:{display:true,position:"bottom",labels:{font:{size:11,family:"'DM Sans',sans-serif"},boxWidth:12,usePointStyle:true,padding:14,color:'#9C9A90'}},tooltip:{backgroundColor:'rgba(26,26,26,0.92)',titleColor:'#fff',bodyColor:'rgba(255,255,255,0.8)',titleFont:{size:12,weight:'600',family:"'DM Sans',sans-serif"},bodyFont:{size:12,family:"'DM Mono',monospace"},padding:10,cornerRadius:6,callbacks:{label:ctx=>" "+ctx.dataset.label+": "+Math.round(ctx.raw||0).toLocaleString("pt-BR")}}}}});
  } else {
    const datasets=sortedYrs.map(y=>barDs(y,getYrData(y,"alcance",false)));
    fbCharts.rch=new Chart(rchEl,{type:"bar",data:{labels:MONTHS,datasets},options:baseOpt(fmtNumAx,fmtNumTip,true)});
  }
}

// GOOGLE SHEETS SYNC

const SHEET_ID = "1yG0FvBQLmJrtV1EmwDo2jPXYyyHhrGO2S7-yEmGk7xs";

// Tab name → { gid, channel }
// gid = number after ?gid= in the sheet URL when you click each tab
let SHEET_TABS = {
  "Facebook Ads Brasília": { gid: "0", channel: "brasilia" },
};

// Row order in your sheet (row 1 = header, rows 2+ = metrics in this order)
const ROW_METRIC_MAP = [
  "investimento","alcance","impressao","frequencia","cliques",
  "ctr","cpc","pageview","custoPageview","leads","cpl"
];
// Columns B–M = Jan–Dez (index 1–12 in the parsed CSV row)
const COL_MONTH_START = 1;

function parseBR(str) {
  if (!str || str.trim()==="" || str.trim()==="-" || str.trim()==="—") return 0;
  return parseFloat(str.replace(/R\$\s*/g,"").replace(/\./g,"").replace(",",".").trim()) || 0;
}

async function fetchSheetCSV(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("HTTP "+res.status+" — verifique se a planilha está publicada");
  return await res.text();
}

function parseCSV(csv) {
  return csv.split("\n").map(l => {
    const row=[]; let cur="", inQ=false;
    for(let i=0;i<l.length;i++){
      if(l[i]==='"') inQ=!inQ;
      else if(l[i]===","&&!inQ){row.push(cur.trim());cur="";}
      else cur+=l[i];
    }
    row.push(cur.trim()); return row;
  });
}

function csvToChannelData(rows) {
  const data = Object.fromEntries(FB_METRICS.map(m=>[m.key,new Array(12).fill(0)]));
  for(let r=1;r<rows.length;r++){
    const key=ROW_METRIC_MAP[r-1]; if(!key) continue;
    for(let m=0;m<12;m++) data[key][m]=parseBR(rows[r][COL_MONTH_START+m]||"");
  }
  return data;
}

let syncStatus={loading:false,lastSync:null,error:null};

function setSyncUI(st){
  const btn=document.getElementById("syncBtn"), badge=document.getElementById("syncBadge");
  if(!btn) return;
  if(st==="loading"){
    btn.innerHTML='<span class="sync-spinner"></span> Sincronizando…'; btn.disabled=true;
  } else if(st==="ok"){
    const t=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Sincronizar';
    btn.disabled=false;
    if(badge){badge.textContent="Atualizado "+t; badge.style.color="var(--ok)";}
  } else {
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Tentar novamente';
    btn.disabled=false;
    if(badge){badge.textContent="Erro na sincronização"; badge.style.color="var(--bad)";}
  }
}

async function syncFromSheets(){
  if(syncStatus.loading) return;
  syncStatus.loading=true; setSyncUI("loading");
  let anyLoaded=false; const errors=[];
  for(const [tabName,cfg] of Object.entries(SHEET_TABS)){
    try{
      const csv=await fetchSheetCSV(cfg.gid);
      const rows=parseCSV(csv);
      if(rows.length<2){errors.push(tabName+": vazia"); continue;}
      const newData=csvToChannelData(rows);
      if(!fbState.channels[cfg.channel]) fbState.channels[cfg.channel]={name:tabName,color:"#C9A96E",data:newData};
      else fbState.channels[cfg.channel].data=newData;
      anyLoaded=true;
    }catch(e){ errors.push(tabName+": "+e.message); }
  }
  syncStatus.loading=false;
  if(anyLoaded){
    syncStatus.lastSync=new Date(); setSyncUI("ok");
    if(state.currentPage==="fbads") renderFbPage();
    showToast(errors.length?"Dados carregados com avisos: "+errors.join("; "):"✓ Planilha sincronizada com sucesso", errors.length?"warn":"ok");
  } else {
    syncStatus.error=errors.join("; "); setSyncUI("error");
    showToast("Erro: "+errors.join("; "), "error");
  }
}

function openSyncSetup(){
  const tabRows=Object.entries(SHEET_TABS).map(([name,cfg],i)=>`
    <div style="display:grid;grid-template-columns:1fr 130px 150px;gap:8px;margin-bottom:8px;">

    </div>`).join("");

  document.getElementById("syncModalBody").innerHTML=`
    <div style="background:var(--gold-light);border:1px solid var(--gold-dim2);border-radius:6px;padding:16px 18px;margin-bottom:20px;font-size:13px;color:var(--ink-2);line-height:1.8;">
      <div style="font-size:11px;font-weight:700;color:var(--gold-mid);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">Como publicar a planilha</div>
      <b>1.</b> Na planilha, vá em <b>Arquivo → Compartilhar → Publicar na web</b><br>
      <b>2.</b> Selecione a aba desejada → clique <b>Publicar</b><br>
      <b>3.</b> Cole abaixo o <b>GID</b> de cada aba — é o número após <code style="background:rgba(0,0,0,.08);padding:1px 6px;border-radius:3px;font-size:12px;">?gid=</code> na URL da aba
    </div>
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);display:grid;grid-template-columns:1fr 130px 150px;gap:8px;margin-bottom:8px;padding:0 2px;">
      <span>Aba na planilha</span><span>GID</span><span>Canal no BI</span>
    </div>
    ${tabRows}
    <button class="btn" style="margin-top:12px;font-size:11px;width:fit-content;" onclick="addSyncTab()">+ Adicionar aba</button>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-4);">
      Planilha: <code style="color:var(--ink-3);">docs.google.com/spreadsheets/d/${SHEET_ID}</code>
    </div>`;
  document.getElementById("syncModal").classList.add("open");
}

let _syncTabCount = Object.keys(SHEET_TABS).length;
function addSyncTab(){
  _syncTabCount++;
  const i=_syncTabCount-1;
  const chOpts=Object.entries(fbState.channels).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join("");
  const row=document.createElement("div");
  row.style.cssText="display:grid;grid-template-columns:1fr 130px 150px;gap:8px;margin-bottom:8px;";
  row.innerHTML=`<input class="form-input" id="st-name-${i}" placeholder="Nome da aba"><input class="form-input" id="st-gid-${i}" placeholder="GID" style="font-family:'DM Mono',monospace"><select class="form-input" id="st-ch-${i}">${chOpts}</select>`;
  document.getElementById("syncModal").querySelector(".btn[onclick='addSyncTab()']").before(row);
}

function saveSyncConfig(){
  const newTabs={};
  for(let i=0;i<_syncTabCount;i++){
    const name=document.getElementById(`st-name-${i}`)?.value?.trim();
    const gid=document.getElementById(`st-gid-${i}`)?.value?.trim();
    const ch=document.getElementById(`st-ch-${i}`)?.value;
    if(name&&gid) newTabs[name]={gid,channel:ch};
  }
  SHEET_TABS=newTabs;
  closeModal("syncModal");
  syncFromSheets();
}

function showToast(msg, type="ok"){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.textContent=msg;
  const col=type==="ok"?"var(--gold-mid)":type==="warn"?"var(--warn)":"var(--bad)";
  t.style.cssText=`position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface2);color:${col};padding:12px 24px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:9999;border:1px solid ${col};max-width:520px;text-align:center;transition:opacity .4s;`;
  t.style.opacity="1"; clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.style.opacity="0",4500);
}

renderAll();
</script>

<script>

// ══════════════════════════════════════════════════

const UNIT_COLORS = ['#C9A96E','#38BDF8','#818CF8','#F472B6','#34D399','#FB923C','#2DD4BF','#F87171'];

// Garantir unidades Nefrostar no fbState e remover genéricas
const NEFROSTAR_UNITS = [
  { key:'brasilia',    name:'Brasília',        color:'#C9A96E' },
  { key:'morumbi',     name:'Morumbi — SP',    color:'#1a73e8' },

];
NEFROSTAR_UNITS.forEach(u => {

  } else { fbState.channels[u.key].name=u.name; fbState.channels[u.key].color=u.color; }

['sp','rj'].forEach(k => { if(fbState.channels[k]) delete fbState.channels[k]; });

let wiz = { targetUnit:null, file:null, sheets:[] };

function openImportModal(){

  renderWizStep1();
  document.getElementById('importModal').classList.add('open');
}

function renderWizStep1(){
  const cards = Object.entries(fbState.channels).map(([k,ch])=>{
    const hasData = Object.values(ch.years||{}).some(yr=>Object.values(yr).some(a=>a.some(v=>v>0)));

  }).join('');
  document.getElementById('importModalBody').innerHTML=`
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px;">1 — Selecione a unidade</div>
    <div class="unit-import-grid">${cards}

function renderWizStep2(){

function loadFile(file){
  wiz.file=file;

  dz.innerHTML=`<svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

function readCSV(file){
  const r=new FileReader();
  r.onload=e=>{
    wiz.sheets=[{name:file.name.replace(/\.csv$/i,''), rows:csvParse(e.target.result)}];
    renderSheetMap();
  };
  r.readAsText(file,'UTF-8');
}

function readXLSX(file){
  const loadLib=cb=>{
    if(typeof XLSX!=='undefined'){cb();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=cb; s.onerror=()=>showToast('Erro ao carregar leitor XLSX. Tente exportar como CSV.','error');
    document.head.appendChild(s);
  };
  loadLib(()=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        wiz.sheets=wb.SheetNames.map(name=>({name, rows:XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:''})}));
        renderSheetMap();
      }catch(err){showToast('Erro: '+err.message,'error');}
    };
    r.readAsBinaryString(file);
  });
}

function csvParse(text){
  return text.split('\n').map(l=>{
    const row=[];let cur='',inQ=false;
    for(let i=0;i<l.length;i++){if(l[i]==='"')inQ=!inQ;else if(l[i]===','&&!inQ){row.push(cur.trim());cur='';}else cur+=l[i];}
    row.push(cur.trim());return row;
  }).filter(r=>r.some(c=>c!==''));
}

function parseBRVal(s){
  if(s===null||s===undefined) return 0;
  let str = String(s).trim();
  if(str===''||str==='-'||str==='—') return 0;
  // Remove R$, %, espaços não-quebráveis
  str = str.replace(/R\$\s*/g,'').replace(/%/g,'').replace(/\u00a0/g,'').replace(/\s+/g,'').trim();
  if(!str||str==='0') return 0;

  // Detectar formato numérico:
  // BR:  1.234,56  ou  1.234  ou  1,56  ou  1234,56
  // US:  1,234.56  ou  1,234  ou  1.56  ou  1234.56
  const hasDot   = str.includes('.');
  const hasComma = str.includes(',');

  if(hasDot && hasComma){
    // Descobrir qual é separador de milhar e qual é decimal
    const dotPos   = str.lastIndexOf('.');
    const commaPos = str.lastIndexOf(',');
    if(commaPos > dotPos){
      // BR: 1.234,56 — ponto=milhar, vírgula=decimal
      str = str.replace(/\./g,'').replace(',','.');
    } else {
      // US: 1,234.56 — vírgula=milhar, ponto=decimal
      str = str.replace(/,/g,'');
    }
  } else if(hasComma && !hasDot){
    // Só vírgula: pode ser BR decimal (2,97) ou BR milhar (1,000)
    const afterComma = str.split(',')[1]||'';
    if(afterComma.length <= 2){
      // Decimal BR: 2,97 → 2.97
      str = str.replace(',','.');
    } else {
      // Milhar BR: 1,000 → 1000
      str = str.replace(/,/g,'');
    }
  } else if(hasDot && !hasComma){
    // Só ponto: pode ser decimal (3.73) ou milhar (1.000)
    const afterDot = str.split('.')[1]||'';
    if(afterDot.length <= 2){
      // Decimal: 3.73 → já ok
    } else {
      // Milhar: 1.000 → 1000
      str = str.replace(/\./g,'');
    }
  }
  // else: sem separador, número puro

  const n = parseFloat(str);
  return isNaN(n) ? 0 : n;
}

function parseSheetToData(rows){
  const data = Object.fromEntries(FB_METRICS.map(m=>[m.key, new Array(12).fill(0)]));
  if(!rows || rows.length < 2) return data;

  // ── 1. Encontrar linha de header (tem nomes de meses) ──
  const MN_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const MN_EN = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  let hRow = -1;
  for(let i=0; i<Math.min(rows.length,10); i++){
    const cells = rows[i].map(c=>String(c||'').toLowerCase().trim());
    const joined = cells.join('|');
    const matchCount = MN_PT.filter(m=>joined.includes(m)).length;
    if(matchCount >= 3){ hRow = i; break; }
  }

  // ── 2. Mapear colunas dos meses ──
  let mCols = new Array(12).fill(-1);
  if(hRow >= 0){
    const hr = rows[hRow].map(c=>String(c||'').toLowerCase().trim());
    MN_PT.forEach((mn, mi)=>{
      // Busca exata ou parcial
      const idx = hr.findIndex(h=>h.startsWith(mn)||h===MN_EN[mi]);
      if(idx >= 0) mCols[mi] = idx;
    });
  }
  // Se não achou pelo header, assumir col 1–12 (col A = nome, B=Jan ... M=Dez)
  const foundCols = mCols.filter(c=>c>=0).length;
  if(foundCols < 3){
    mCols = Array.from({length:12},(_,i)=>i+1);
  }

  // ── 3. Mapear linhas de métricas ──
  const MAP = {
    investimento:  ['investimento','invest.'],
    alcance:       ['alcance'],
    impressao:     ['impres','impressão','impressao'],
    frequencia:    ['frequ','frequência','frequencia'],
    cliques:       ['clique','cliques'],
    ctr:           ['ctr'],
    cpc:           ['cpc'],
    pageview:      ['pageview','page view','pageviews'],
    custoPageview: ['custo page','custo pag','cost page'],
    leads:         ['leads','lead'],
    cpl:           ['cpl'],
    // CRM
    leadsCrm:      ['leads crm','lead crm','crm leads','crm lead','leads no crm','leads para crm','oportunidade','oport'],
    // taxaConv é calculada automaticamente — não precisa ser lida da planilha
  };

  const dataStart = hRow >= 0 ? hRow+1 : 1;
  for(let r=dataStart; r<rows.length; r++){
    const row = rows[r];
    if(!row || !row.length) continue;
    const lbl = String(row[0]||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    if(!lbl) continue;

    for(const [key, pats] of Object.entries(MAP)){
      if(pats.some(p => lbl.startsWith(p.normalize('NFD').replace(/[\u0300-\u036f]/g,'')) || lbl===p.normalize('NFD').replace(/[\u0300-\u036f]/g,''))){
        mCols.forEach((col, mi)=>{
          if(col >= 0 && col < row.length){
            const v = parseBRVal(row[col]);
            data[key][mi] = v;
          }
        });
        break;
      }
    }
  }

  // ── 4. Recalcular CTR, CPC, CPL a partir dos dados brutos ──
  // (NÃO sobrescreve se já vieram corretos da planilha)
  // CTR: se a planilha deu valores > 100, é erro — recalcular
  const ctrMax = Math.max(...data.ctr.filter(v=>v>0));
  if(ctrMax > 100){
    // Está em formato errado (ex: somou), recalcular
    data.ctr = data.ctr.map((v,i)=>{
      const clk=data.cliques[i], imp=data.impressao[i];
      return imp>0?(clk/imp)*100:0;
    });
  }

  return data;
}

function doImport(){
  const sel=wiz.sheets.filter(s=>s.selected);
  if(!sel.length){showToast('Selecione ao menos uma aba.','warn');return;}
  let ok=0, errs=[];
  sel.forEach(s=>{
    const key=s.overrideUnit||wiz.targetUnit;
    const yr=s.detectedYear||fbState.activeYear;
    try{
      const d=parseSheetToData(s.rows);
      const ch=fbState.channels[key];
      if(!ch.years) ch.years={};
      // Substituir o ano inteiro (não mesclar)
      ch.years[yr] = Object.fromEntries(FB_METRICS.map(m=>[m.key, [...d[m.key]]]));
      fbState.activeChannel = key;
      fbState.activeYear = yr;
      ok++;
    }catch(e){ errs.push(s.name+': '+e.message); }
  });
  closeModal('importModal');
  if(state.currentPage==='fbads') renderFbPage();
  showToast(ok ? `✓ ${ok} aba${ok>1?'s':''} importada${ok>1?'s':''} com sucesso!` : 'Nenhuma aba importada. '+errs.join('; '), ok?'ok':'error');
}

async function pdFetch(endpoint, params = {}) {
  params.api_token = PD.TOKEN;
  const qs = new URLSearchParams(params).toString();
  const url = `${PD.BASE}/${endpoint}?${qs}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Pipedrive API ${r.status}`);
  return r.json();
}

async function pdFetchAll(endpoint, extra = {}) {
  let start = 0, all = [];
  while (true) {
    const r = await pdFetch(endpoint, { ...extra, limit: 500, start });
    const data = r.data || [];
    all = all.concat(data);
    if (!r.additional_data?.pagination?.more_items_in_collection) break;
    start += 500;
  }
  return all;
}

async function pdInit() {
  const cont = document.getElementById('pdMain');
  cont.innerHTML = `<div class="pd-loading"><div class="pd-spinner"></div><span>Carregando dados do Pipedrive…</span></div>`;

  try {
    // 1. Pipelines
    const plRes = await pdFetch('pipelines');
    PD.pipelines = plRes.data || [];

    // 2. Stages
    const stRes = await pdFetch('stages');
    PD.stages = stRes.data || [];

    // 3. Deal fields — mapear UTM keys
    const dfRes = await pdFetch('dealFields');
    const fields = dfRes.data || [];
    fields.forEach(f => {
      const k = f.key;
      const n = (f.name || '').toLowerCase();
      if (n.includes('utm_source') || n === 'utm source') PD.utmKeys.source = k;
      else if (n.includes('utm_medium') || n === 'utm medium') PD.utmKeys.medium = k;
      else if (n.includes('utm_campaign') || n === 'utm campaign') PD.utmKeys.campaign = k;
      else if (n.includes('utm_content') || n === 'utm content') PD.utmKeys.content = k;
      else if (n.includes('utm_term') || n === 'utm term') PD.utmKeys.term = k;
      // fallback por sufixo _c
      if (!PD.utmKeys.source && k === 'utm_source_c') PD.utmKeys.source = k;
      if (!PD.utmKeys.medium && k === 'utm_medium_c') PD.utmKeys.medium = k;
      if (!PD.utmKeys.campaign && k === 'utm_campaign_c') PD.utmKeys.campaign = k;
      if (!PD.utmKeys.content && k === 'utm_content_c') PD.utmKeys.content = k;
      if (!PD.utmKeys.term && k === 'utm_term_c') PD.utmKeys.term = k;
      // Campo "Origem do lead" — preenchido manualmente, cobre leads sem UTM (indicação, ligação, etc.)
      if (!PD.origemKey && n.includes('origem do lead')) { PD.origemKey = k; PD.origemField = f; }
      PD.fields[k] = f.name;
      PD.fieldDefs[k] = f;

      // Campos médicos (Convênio / Faz diálise / Clínica) — busca por substring
      // sem acento. "clínica" é checado antes de "diálise" pra evitar que o
      // campo "Qual clínica faz diálise" seja capturado como o campo booleano
      // "Faz diálise?" (ambos contêm "dialise" no nome normalizado).
      // Convênio: no Pipedrive do Nefrostar Brasília o campo se chama
      // "Operadora do plano de saúde", não "Convênio" — cobre as duas formas.
      const nNorm = fbNormalize(f.name);
      if (!PD.medKeys.clinica && nNorm.includes('clinica')) PD.medKeys.clinica = k;
      if (!PD.medKeys.dialise && nNorm.includes('dialise') && !nNorm.includes('clinica')) PD.medKeys.dialise = k;
      if (!PD.medKeys.convenio && (nNorm.includes('operadora') || nNorm.includes('plano de saude') || nNorm.includes('convenio'))) PD.medKeys.convenio = k;
    });

    // 4. Buscar todos os negócios
    cont.innerHTML = `<div class="pd-loading"><div class="pd-spinner"></div><span>Buscando negócios… pode levar alguns segundos.</span></div>`;
    PD.allDeals = await pdFetchAll('deals', { status: 'all' });

    PD.filtered = [...PD.allDeals];
    PD.page = 1;
    pdRender();

  } catch (e) {
    cont.innerHTML = `<div class="pd-error">❌ Erro ao conectar ao Pipedrive: ${e.message}<br><small>Verifique o token de API e a conexão com a internet.</small></div>`;
  }
}

function pdGetUTM(deal, type) {
  const key = PD.utmKeys[type];
  if (!key) return '';
  return deal[key] || '';
}

// Resolve o valor de QUALQUER campo customizado do negócio, pelo key.
// Retorna null se o campo nem foi mapeado (key === null — não achei o campo
// no /dealFields), '—' se o campo existe mas o negócio não tem valor, ou o
// valor formatado (resolvendo enum/set id -> label, incluindo múltipla escolha).
function pdFieldDisplay(deal, key) {
  if (!key) return null;
  const raw = deal[key];
  if (raw === undefined || raw === null || raw === '') return '—';
  const def = PD.fieldDefs[key];
  if (def && Array.isArray(def.options) && def.options.length) {
    const ids = Array.isArray(raw) ? raw : String(raw).split(',');
    const labels = ids
      .map(id => (def.options.find(o => String(o.id) === String(id).trim()) || {}).label || String(id).trim())
      .filter(Boolean);
    return labels.join(', ') || '—';
  }
  return String(raw);
}

// Telefone/email do lead vêm embutidos no objeto person_id do negócio (a API
// do Pipedrive já expande isso quando o negócio tem uma pessoa vinculada).
// Pega o valor marcado como "primary"; se não houver, cai pro primeiro da lista.
function pdPersonContact(deal) {
  const p = deal.person_id;
  if (!p || typeof p !== 'object') return { phone: '', email: '' };
  const pickPrimary = arr => {
    if (!Array.isArray(arr) || !arr.length) return '';
    const primary = arr.find(x => x && x.primary) || arr[0];
    return (primary && primary.value) || '';
  };
  return { phone: pickPrimary(p.phone), email: pickPrimary(p.email) };
}

// Origem combinada: prioriza UTM Source (lead veio de anúncio rastreado);
// se não tiver UTM, cai pro campo "Origem do lead" (preenchido manualmente —
// indicação, ligação, balcão, etc.). Resolve enum (id -> label) quando aplicável.
function pdGetOrigem(deal) {
  const utm = pdGetUTM(deal, 'source');
  if (utm) return utm;
  if (PD.origemKey) {
    const raw = deal[PD.origemKey];
    if (raw !== undefined && raw !== null && raw !== '') {
      if (PD.origemField && Array.isArray(PD.origemField.options)) {
        const opt = PD.origemField.options.find(o => String(o.id) === String(raw));
        if (opt) return opt.label;
      }
      return String(raw);
    }
  }
  return '';
}

// Detecta se o lead veio de Facebook/Instagram/Meta de um jeito confiável.
// Prioriza o campo dedicado "Origem do lead" (canal explícito, ex: "Facebook"),
// já que o UTM Source costuma ser um slug descritivo da campanha/conteúdo
// (ex: "e-book-dialise-noturna") e não necessariamente menciona o canal —
// usar só o UTM Source (como pdGetOrigem faz, com prioridade) sub-detecta
// canal real em boa parte dos casos. Cai pro UTM Source/Medium só se o campo
// "Origem do lead" estiver vazio.
function pdIsMetaOrigin(deal) {
  if (PD.origemKey) {
    const raw = deal[PD.origemKey];
    if (raw !== undefined && raw !== null && raw !== '') {
      let label = String(raw);
      if (PD.origemField && Array.isArray(PD.origemField.options)) {
        const opt = PD.origemField.options.find(o => String(o.id) === String(raw));
        if (opt) label = opt.label;
      }
      const labelLow = label.toLowerCase();
      return labelLow.includes('facebook') || labelLow.includes('meta') || labelLow.includes('instagram') || labelLow.includes('fb');
    }
  }
  const src = pdGetUTM(deal, 'source').toLowerCase();
  const med = pdGetUTM(deal, 'medium').toLowerCase();
  return src.includes('facebook') || src.includes('meta') || src.includes('instagram') || src.includes('fb')
      || med.includes('facebook') || med.includes('meta') || med.includes('instagram') || med.includes('fb');
}

function pdStageName(stageId) {
  return PD.stages.find(s => s.id === stageId)?.name || stageId;
}

function pdPipelineName(plId) {
  return PD.pipelines.find(p => p.id === plId)?.name || plId;
}

function pdStageColor(stageName) {
  const map = {
    'recém cheg': '#6366f1', 'primeiro': '#0ea5e9', 'segundo': '#06b6d4',
    'terceiro': '#f59e0b', 'sem resposta': '#94a3b8', 'pré qualif': '#10b981',
    'oportunidade': '#22c55e', 'standby': '#f97316', 'reunião': '#8b5cf6',
    'perdido': '#ef4444', 'ganho': '#16a34a',
  };
  const low = (stageName || '').toLowerCase();
  for (const [k, v] of Object.entries(map)) {
    if (low.startsWith(k)) return v;
  }
  return '#C9A96E';
}

// Etapa do negócio pra exibição: prioriza o status oficial do Pipedrive
// (won/lost) sobre o nome da etapa/coluna, porque um negócio pode estar
// marcado como perdido sem ter sido movido de coluna no funil — o status é
// a fonte de verdade de "ganhou/perdeu", a etapa só importa enquanto "open".
function pdDealStageLabel(d) {
  if (d.status === 'won') return 'Ganho';
  if (d.status === 'lost') return 'Perdido';
  return pdStageName(d.stage_id);
}

function pdApplyFilters() {
  const f = PD.f;
  PD.filtered = PD.allDeals.filter(d => {
    if (f.pipeline && String(d.pipeline_id) !== f.pipeline) return false;
    if (f.stage && String(d.stage_id) !== f.stage) return false;
    if (f.origem && !pdGetOrigem(d).toLowerCase().includes(f.origem.toLowerCase())) return false;
    if (f.utmMedium && !pdGetUTM(d, 'medium').toLowerCase().includes(f.utmMedium.toLowerCase())) return false;
    if (f.utmCampaign && !pdGetUTM(d, 'campaign').toLowerCase().includes(f.utmCampaign.toLowerCase())) return false;
    if (f.dateFrom) {
      const dt = new Date(d.add_time);
      if (dt < new Date(f.dateFrom)) return false;
    }
    if (f.dateTo) {
      const dt = new Date(d.add_time);
      if (dt > new Date(f.dateTo + 'T23:59:59')) return false;
    }
    return true;
  });
  PD.page = 1;
  pdRenderKPIs();
  pdRenderCharts();
  pdRenderTable();
}

function pdStageFilterByPipeline() {
  const sel = document.getElementById('pdStageSelect');
  if (!sel) return;
  const plId = PD.f.pipeline;
  const stages = plId
    ? PD.stages.filter(s => String(s.pipeline_id) === plId)
    : PD.stages;
  sel.innerHTML = `<option value="">Todas as etapas</option>` +
    stages.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  PD.f.stage = '';
}

function pdPopulateUTMSelects() {
  const origemSet = new Set(), medSet = new Set();
  PD.allDeals.forEach(d => {
    const origem = pdGetOrigem(d);
    const med = pdGetUTM(d, 'medium');
    if (origem) origemSet.add(origem);
    if (med) medSet.add(med);
  });
  const origemSel = document.getElementById('pdOrigemSel');
  const medSel = document.getElementById('pdMediumSel');
  if (origemSel) origemSel.innerHTML = `<option value="">Todas</option>` + [...origemSet].sort().map(v => `<option value="${v}">${v}</option>`).join('');
  if (medSel) medSel.innerHTML = `<option value="">Todos</option>` + [...medSet].sort().map(v => `<option value="${v}">${v}</option>`).join('');
}

function pdRenderKPIs() {
  const deals = PD.filtered;
  const total = deals.length;
  const won = deals.filter(d => d.status === 'won').length;
  const lost = deals.filter(d => d.status === 'lost').length;
  const open = deals.filter(d => d.status === 'open').length;
  const convRate = total > 0 ? ((won / total) * 100).toFixed(1) : '0.0';

  const kpis = [
    { label: 'Total de Leads', value: total.toLocaleString('pt-BR'), sub: 'negócios filtrados' },
    { label: 'Em aberto', value: open.toLocaleString('pt-BR'), sub: `${total > 0 ? ((open/total)*100).toFixed(0) : 0}% do total · ver etapas abaixo` },
    { label: 'Ganhos', value: won.toLocaleString('pt-BR'), sub: 'status: won', color: 'var(--ok)' },
    { label: 'Perdidos', value: lost.toLocaleString('pt-BR'), sub: 'status: lost', color: 'var(--bad)' },
    { label: 'Taxa de Conversão', value: convRate + '%', sub: 'ganhos / total', color: parseFloat(convRate) > 10 ? 'var(--ok)' : 'var(--warn)' },
  ];

  document.getElementById('pdKpis').innerHTML = kpis.map(k => `
    <div class="pd-kpi">
      <div class="pd-kpi-label">${k.label}</div>
      <div class="pd-kpi-value" style="${k.color ? `color:${k.color}` : ''}">${k.value}</div>
      <div class="pd-kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function pdRenderCharts() {
  // ── Chart: Origem combinada (UTM Source + Origem do lead) (doughnut) ──
  const srcCount = {};
  PD.filtered.forEach(d => {
    const src = pdGetOrigem(d) || 'Sem origem';
    srcCount[src] = (srcCount[src] || 0) + 1;
  });
  const srcLabels = Object.keys(srcCount).sort((a, b) => srcCount[b] - srcCount[a]).slice(0, 8);
  const srcData = srcLabels.map(l => srcCount[l]);
  const COLORS = ['#C9A96E','#38BDF8','#818CF8','#F472B6','#34D399','#FB923C','#2DD4BF','#F87171'];

  const ctx1 = document.getElementById('pdChartSource');
  if (ctx1) {
    if (PD.chartSource) PD.chartSource.destroy();
    PD.chartSource = new Chart(ctx1, {
      type: 'doughnut',
      data: { labels: srcLabels, datasets: [{ data: srcData, backgroundColor: COLORS, borderWidth: 2, borderColor: '#15171D' }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {
          legend: { position: 'right', labels: { font: { size: 11, family: 'DM Sans' }, boxWidth: 10, padding: 10 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed} leads` } }
        }
      }
    });
  }

  // ── Funnel bars: detalha o KPI "Em aberto" por etapa ──
  const openDeals = PD.filtered.filter(d => d.status === 'open');
  const stageCount = {};
  openDeals.forEach(d => {
    const sn = pdStageName(d.stage_id);
    stageCount[sn] = (stageCount[sn] || 0) + 1;
  });
  const sortedStages = Object.entries(stageCount).sort((a, b) => b[1] - a[1]);
  const maxSt = sortedStages[0]?.[1] || 1;

  const fbEl = document.getElementById('pdFunnelBars');
  if (fbEl) {
    fbEl.innerHTML = sortedStages.slice(0, 12).map(([name, count]) => {
      const pct = Math.round((count / maxSt) * 100);
      const color = pdStageColor(name);
      return `
        <div class="pd-funnel-row">
          <span class="pd-funnel-name" title="${name}">${name}</span>
          <div class="pd-funnel-track"><div class="pd-funnel-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="pd-funnel-count">${count}</span>
        </div>
      `;
    }).join('') || `<div class="pd-empty">Nenhum lead em aberto com esses filtros.</div>`;
  }
}

function pdRenderTable() {
  const deals = PD.filtered;
  const total = deals.length;
  const totalPages = Math.max(1, Math.ceil(total / PD.perPage));
  if (PD.page > totalPages) PD.page = totalPages;
  const start = (PD.page - 1) * PD.perPage;
  const slice = deals.slice(start, start + PD.perPage);

  const tbody = document.getElementById('pdTableBody');
  const countEl = document.getElementById('pdTableCount');
  const pagEl = document.getElementById('pdPagination');
  if (!tbody) return;

  countEl.textContent = `${total.toLocaleString('pt-BR')} leads · pág. ${PD.page}/${totalPages}`;

  tbody.innerHTML = slice.map(d => {
    const name = d.person_name || d.org_name || d.title || '—';
    const org = d.org_name && d.person_name ? d.org_name : '';
    const pipeline = pdPipelineName(d.pipeline_id);
    const stage = pdStageName(d.stage_id);
    const stColor = pdStageColor(stage);
    const src = pdGetOrigem(d);
    const med = pdGetUTM(d, 'medium');
    const cmp = pdGetUTM(d, 'campaign');
    const dt = d.add_time ? new Date(d.add_time).toLocaleDateString('pt-BR') : '—';

    return `<tr>
      <td>
        <div class="pd-lead-name">${name}</div>
        ${org ? `<div class="pd-lead-org">${org}</div>` : ''}
      </td>
      <td style="font-size:11px;color:var(--ink-3)">${pipeline}</td>
      <td><span class="pd-stage-pill" style="background:${stColor}22;color:${stColor}">${stage}</span></td>
      <td>${src ? `<span class="pd-utm-tag">${src}</span>` : '<span style="color:var(--ink-4);font-size:11px">—</span>'}</td>
      <td>${med ? `<span class="pd-utm-tag medium">${med}</span>` : '<span style="color:var(--ink-4);font-size:11px">—</span>'}</td>
      <td>${cmp ? `<span class="pd-utm-tag campaign" title="${cmp}">${cmp.length > 30 ? cmp.slice(0,30)+'…' : cmp}</span>` : '<span style="color:var(--ink-4);font-size:11px">—</span>'}</td>
      <td style="font-size:11px;color:var(--ink-3);white-space:nowrap">${dt}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="7" class="pd-empty">Nenhum lead encontrado com esses filtros.</td></tr>`;

  // Paginação
  const btnClass = (p, active) => `class="pd-page-btn${active ? ' active' : ''}"`;
  let pagHtml = `<button ${btnClass(PD.page-1)} onclick="pdGoPage(${PD.page-1})" ${PD.page<=1?'disabled':''}>‹ Anterior</button>`;
  const range = 2;
  for (let p = Math.max(1, PD.page - range); p <= Math.min(totalPages, PD.page + range); p++) {
    pagHtml += `<button ${btnClass(p, p===PD.page)} onclick="pdGoPage(${p})">${p}</button>`;
  }
  pagHtml += `<button ${btnClass(PD.page+1)} onclick="pdGoPage(${PD.page+1})" ${PD.page>=totalPages?'disabled':''}>Próximo ›</button>`;
  pagEl.innerHTML = pagHtml;
}

function pdGoPage(p) {
  const total = PD.filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PD.perPage));
  PD.page = Math.max(1, Math.min(p, totalPages));
  pdRenderTable();
  document.getElementById('pdMain').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function pdClearFilters() {
  PD.f = { pipeline:'', stage:'', origem:'', utmMedium:'', utmCampaign:'', dateFrom:'', dateTo:'' };
  pdRender();
}

  PD.allDeals = [];

// Baixa pra minúsculo, remove acentos e troca qualquer separador (|, _, -, etc)
// por espaço — assim "ABO|Captação_Diáise" e "abo captacao diaise" comparam igual.
function fbNormalize(str) {
  return (str || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}
