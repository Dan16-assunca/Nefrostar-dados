<script>
// ══════════════════════════════════════════════════
// SISTEMA DE IMPORTAÇÃO POR UNIDADE
// ══════════════════════════════════════════════════

const UNIT_COLORS = ['#C9A96E','#1a73e8','#0f766e','#7c3aed','#db2777','#d97706','#0891b2','#dc2626'];

// Garantir unidades Nefrostar no fbState e remover genéricas
const NEFROSTAR_UNITS = [
  { key:'brasilia',    name:'Brasília',        color:'#C9A96E' },
  { key:'morumbi',     name:'Morumbi — SP',    color:'#1a73e8' },
  { key:'alphaville',  name:'Alphaville — SP', color:'#0f766e' },
];
NEFROSTAR_UNITS.forEach(u => {
  if (!fbState.channels[u.key]) {
    fbState.channels[u.key] = { name:u.name, color:u.color, years:{} };
  } else { fbState.channels[u.key].name=u.name; fbState.channels[u.key].color=u.color; }
});
['sp','rj'].forEach(k => { if(fbState.channels[k]) delete fbState.channels[k]; });

let wiz = { targetUnit:null, file:null, sheets:[] };

function openImportModal(){
  wiz = { targetUnit:null, file:null, sheets:[] };
  renderWizStep1();
  document.getElementById('importModal').classList.add('open');
}

function renderWizStep1(){
  const cards = Object.entries(fbState.channels).map(([k,ch])=>{
    const hasData = Object.values(ch.years||{}).some(yr=>Object.values(yr).some(a=>a.some(v=>v>0)));
    return `<div class="unit-import-card" id="uic-${k}" onclick="pickUnit('${k}')">
      ${hasData?'<span class="uic-badge">Com dados</span>':''}
      <div style="display:flex;align-items:center;margin-bottom:3px;">
        <span class="uic-dot" style="background:${ch.color}"></span>
        <span class="uic-name">${ch.name}</span>
      </div>
      <div class="uic-sub">${hasData?'Clique para atualizar':'Sem dados ainda'}</div>
    </div>`;
  }).join('');
  document.getElementById('importModalBody').innerHTML=`
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px;">1 — Selecione a unidade</div>
    <div class="unit-import-grid">${cards}
      <div class="add-unit-card" onclick="openNewUnit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Unidade
      </div>
    </div>`;
  document.getElementById('importModalFooter').innerHTML=`<button class="btn" onclick="closeModal('importModal')">Cancelar</button>`;
}

function pickUnit(key){
  wiz.targetUnit=key;
  document.querySelectorAll('.unit-import-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById('uic-'+key)?.classList.add('selected');
  setTimeout(()=>renderWizStep2(), 180);
}

function renderWizStep2(){
  const ch=fbState.channels[wiz.targetUnit];
  document.getElementById('importModalBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);">
      <span style="width:9px;height:9px;border-radius:50%;background:${ch.color};display:inline-block"></span>
      <span style="font-size:13px;font-weight:600;">${ch.name}</span>
      <button onclick="renderWizStep1()" style="margin-left:auto;font-size:11px;color:var(--gold-mid);background:none;border:none;cursor:pointer;padding:0;font-weight:600;">← Trocar</button>
    </div>
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;">2 — Carregar planilha</div>
    <div class="drop-zone" id="dropZone"
         onclick="document.getElementById('fileInp').click()"
         ondragover="event.preventDefault();this.classList.add('drag-over')"
         ondragleave="this.classList.remove('drag-over')"
         ondrop="onDrop(event)">
      <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <div style="font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:4px;">Arraste o arquivo aqui ou clique para selecionar</div>
      <div style="font-size:11px;color:var(--ink-4);">Aceita <strong>.xlsx</strong>, <strong>.xls</strong> ou <strong>.csv</strong> exportado do Google Sheets</div>
    </div>
    <input type="file" id="fileInp" accept=".xlsx,.xls,.csv" style="display:none" onchange="onFileSelect(event)">
    <div id="sheetMapWrap"></div>`;
  document.getElementById('importModalFooter').innerHTML=`
    <button class="btn" onclick="renderWizStep1()">← Voltar</button>
    <button class="btn btn-gold" id="btnImport" onclick="doImport()" disabled style="opacity:.45;cursor:not-allowed;">Confirmar importação</button>`;
}

function onDrop(e){ e.preventDefault(); document.getElementById('dropZone').classList.remove('drag-over'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); }
function onFileSelect(e){ if(e.target.files[0]) loadFile(e.target.files[0]); }

function loadFile(file){
  wiz.file=file;
  const dz=document.getElementById('dropZone');
  dz.innerHTML=`<svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <div style="font-size:13px;font-weight:600;color:var(--ok)">📄 ${file.name}</div>
    <div style="font-size:11px;color:var(--ink-4)">${(file.size/1024).toFixed(1)} KB — lendo abas…</div>`;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv') readCSV(file); else readXLSX(file);
}

function readCSV(file){
  const r=new FileReader();
  r.onload=e=>{
    wiz.sheets=[{name:file.name.replace(/\.csv$/i,''), rows:csvParse(e.target.result)}];
    renderSheetMap();
  };
  r.readAsText(file,'UTF-8');
}

function readXLSX(file){
  const loadLib=cb=>{
    if(typeof XLSX!=='undefined'){cb();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=cb; s.onerror=()=>showToast('Erro ao carregar leitor XLSX. Tente exportar como CSV.','error');
    document.head.appendChild(s);
  };
  loadLib(()=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        wiz.sheets=wb.SheetNames.map(name=>({name, rows:XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:''})}));
        renderSheetMap();
      }catch(err){showToast('Erro: '+err.message,'error');}
    };
    r.readAsBinaryString(file);
  });
}

function csvParse(text){
  return text.split('\n').map(l=>{
    const row=[];let cur='',inQ=false;
    for(let i=0;i<l.length;i++){if(l[i]==='"')inQ=!inQ;else if(l[i]===','&&!inQ){row.push(cur.trim());cur='';}else cur+=l[i];}
    row.push(cur.trim());return row;
  }).filter(r=>r.some(c=>c!==''));
}

const CUR_YEAR = new Date().getFullYear();
const YEAR_OPTS = [CUR_YEAR-2, CUR_YEAR-1, CUR_YEAR, CUR_YEAR+1].map(y=>`<option value="${y}" ${y===CUR_YEAR?'selected':''}>${y}</option>`).join('');

  wiz.sheets=wiz.sheets.map(s=>{
    const flat=s.rows.map(r=>r.map(c=>String(c).toLowerCase()).join(' ')).join(' ');
    const hasMetrics=/investimento|leads|cpl/.test(flat);
    const ym=s.name.match(/20\d{2}/); const yr=ym?parseInt(ym[0]):CUR_YEAR;
    return {...s, hasMetrics, detectedYear:yr, selected:hasMetrics, overrideUnit:wiz.targetUnit};
  });

  const unitOpts=Object.entries(fbState.channels).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');

  document.getElementById('sheetMapWrap').innerHTML=`
    <div style="margin-top:20px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;">3 — Selecione as abas e defina o ano</div>
      <div class="sheet-list">
        ${wiz.sheets.map((s,i)=>`
          <div class="sheet-item">
            <input type="checkbox" ${s.selected?'checked':''} onchange="wiz.sheets[${i}].selected=this.checked">
            <div>
              <div style="font-size:12px;font-weight:500;color:var(--ink-2)">${s.name}</div>
              <div style="font-size:10px;color:var(--ink-4);margin-top:2px">${s.rows.length} linhas${s.hasMetrics?' · <span style="color:var(--ok)">✓ métricas detectadas</span>':' · <span style="color:var(--warn)">⚠ verificar formato</span>'}</div>
            </div>
            <select onchange="wiz.sheets[${i}].detectedYear=parseInt(this.value)">${YEAR_OPTS.replace(`value="${s.detectedYear}"`,`value="${s.detectedYear}" selected`)}</select>
            <select onchange="wiz.sheets[${i}].overrideUnit=this.value">
              ${Object.entries(fbState.channels).map(([k,v])=>`<option value="${k}" ${k===wiz.targetUnit?'selected':''}>${v.name}</option>`).join('')}
            </select>
          </div>`).join('')}
      </div>
      ${wiz.sheets.some(s=>!s.hasMetrics)?`<div style="margin-top:10px;padding:10px 14px;background:var(--warn-bg);border-radius:var(--radius);font-size:11px;color:var(--warn);">⚠ Formato esperado: linha 1 = cabeçalhos (Métricas, Janeiro…), linhas seguintes = Investimento, Alcance, Impressão, Frequência, Cliques, CTR, CPC, Pageview, Custo Pageview, Leads, CPL.</div>`:''}
    </div>`;

  const btn=document.getElementById('btnImport');
  btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer';
}

function parseBRVal(s){
  if(s===null||s===undefined) return 0;
  let str = String(s).trim();
  if(str===''||str==='-'||str==='—') return 0;
  // Remove R$, %, espaços não-quebráveis
  str = str.replace(/R\$\s*/g,'').replace(/%/g,'').replace(/\u00a0/g,'').replace(/\s+/g,'').trim();
  if(!str||str==='0') return 0;

  // Detectar formato numérico:
  // BR:  1.234,56  ou  1.234  ou  1,56  ou  1234,56
  // US:  1,234.56  ou  1,234  ou  1.56  ou  1234.56
  const hasDot   = str.includes('.');
  const hasComma = str.includes(',');

  if(hasDot && hasComma){
    // Descobrir qual é separador de milhar e qual é decimal
    const dotPos   = str.lastIndexOf('.');
    const commaPos = str.lastIndexOf(',');
    if(commaPos > dotPos){
      // BR: 1.234,56 — ponto=milhar, vírgula=decimal
      str = str.replace(/\./g,'').replace(',','.');
    } else {
      // US: 1,234.56 — vírgula=milhar, ponto=decimal
      str = str.replace(/,/g,'');
    }
  } else if(hasComma && !hasDot){
    // Só vírgula: pode ser BR decimal (2,97) ou BR milhar (1,000)
    const afterComma = str.split(',')[1]||'';
    if(afterComma.length <= 2){
      // Decimal BR: 2,97 → 2.97
      str = str.replace(',','.');
    } else {
      // Milhar BR: 1,000 → 1000
      str = str.replace(/,/g,'');
    }
  } else if(hasDot && !hasComma){
    // Só ponto: pode ser decimal (3.73) ou milhar (1.000)
    const afterDot = str.split('.')[1]||'';
    if(afterDot.length <= 2){
      // Decimal: 3.73 → já ok
    } else {
      // Milhar: 1.000 → 1000
      str = str.replace(/\./g,'');
    }
  }
  // else: sem separador, número puro

  const n = parseFloat(str);
  return isNaN(n) ? 0 : n;
}

function parseSheetToData(rows){
  const data = Object.fromEntries(FB_METRICS.map(m=>[m.key, new Array(12).fill(0)]));
  if(!rows || rows.length < 2) return data;

  // ── 1. Encontrar linha de header (tem nomes de meses) ──
  const MN_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const MN_EN = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  let hRow = -1;
  for(let i=0; i<Math.min(rows.length,10); i++){
    const cells = rows[i].map(c=>String(c||'').toLowerCase().trim());
    const joined = cells.join('|');
    const matchCount = MN_PT.filter(m=>joined.includes(m)).length;
    if(matchCount >= 3){ hRow = i; break; }
  }

  // ── 2. Mapear colunas dos meses ──
  let mCols = new Array(12).fill(-1);
  if(hRow >= 0){
    const hr = rows[hRow].map(c=>String(c||'').toLowerCase().trim());
    MN_PT.forEach((mn, mi)=>{
      // Busca exata ou parcial, mas IGNORAR colunas "total", "média", "average"
      const idx = hr.findIndex((h,ci)=>{
        if(/^total|^media|^média|^average|^sum/.test(h)) return false; // pular totais
        return h.startsWith(mn)||h===MN_EN[mi];
      });
      if(idx >= 0) mCols[mi] = idx;
    });
  }
  // Se não achou pelo header, assumir col 1–12 (col A = nome, B=Jan ... M=Dez)
  // MAS limitar a no máximo 12 colunas e ignorar coluna de totais
  const foundCols = mCols.filter(c=>c>=0).length;
  if(foundCols < 3){
    mCols = Array.from({length:12},(_,i)=>i+1);
  }
  // Detectar TODAS as colunas TOTAL/SOMA para excluir
  const totalCols = new Set();
  if(hRow >= 0){
    const hr = rows[hRow].map(c=>String(c||'').toLowerCase().trim());
    hr.forEach((h,i)=>{ if(/^total|^soma|^sum|^media|^média/.test(h)) totalCols.add(i); });
  }
  // Compatibilidade com código antigo
  const totalCol = totalCols.size > 0 ? [...totalCols][0] : -1;

  // ── 3. Mapear linhas de métricas ──
  // ATENÇÃO: ordem importa — mais específico PRIMEIRO para evitar match errado
  const MAP = {
    investimento:  ['investimento','invest.'],
    alcance:       ['alcance'],
    impressao:     ['impres','impressao'],
    frequencia:    ['frequ','frequencia'],
    cliques:       ['clique','cliques'],
    ctr:           ['ctr'],
    cpc:           ['cpc'],
    pageview:      ['pageview','page view','pageviews'],
    custoPageview: ['custo pageview','custo page','custo pag','cost page'],
    // CRM ANTES de leads/cpl genéricos — evitar match errado
    leadsCrm:      ['leads crm','lead crm','crm leads','crm lead','leads no crm','leads para crm','leads ao crm'],
    cplCrm:        ['cpl crm','custo por lead crm','cpl do crm'],
    taxaConv:      ['tx de conv','taxa de conv','taxa conv','conversao','conversão','taxa de conversao'],
    // Genéricos por último
    leads:         ['leads','lead'],
    cpl:           ['cpl'],
  };

  const dataStart = hRow >= 0 ? hRow+1 : 1;
  for(let r=dataStart; r<rows.length; r++){
    const row = rows[r];
    if(!row || !row.length) continue;
    const lbl = String(row[0]||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    if(!lbl) continue;
    // Pular linhas de totais
    if(/^total|^soma|^sum/.test(lbl)) continue;

    for(const [key, pats] of Object.entries(MAP)){
      const normPats = pats.map(p=>p.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase());
      const matched = normPats.some(np => {
        // Match exato: 'leads' == 'leads' ✓
        if(lbl === np) return true;
        // Padrão multi-palavra (tem espaço): 'leads crm' casa com 'leads crm...' ✓
        if(np.includes(' ') && lbl.startsWith(np)) return true;
        // Padrão simples (sem espaço): só casa se o label NÃO tem palavras adicionais
        // 'leads' NÃO casa com 'leads crm', mas 'ctr' casa com 'ctr' exatamente
        if(!np.includes(' ') && lbl === np) return true;
        return false;
      });
      if(matched){
        mCols.forEach((col, mi)=>{
          if(col < 0 || col >= row.length) return;
          if(totalCols.has(col)) return; // ignorar colunas TOTAL/SOMA/MÉDIA
          const raw = row[col];
          const v = parseBRVal(raw);
          if(v !== 0) data[key][mi] = v;
        });
        break;
      }
    }
  }

  // ── 4. Pós-processamento: sanity checks e normalização ──

  // CTR: se veio > 100, é erro — recalcular de cliques/impressao
  if(Math.max(...data.ctr.filter(v=>v>0), 0) > 100){
    data.ctr = data.ctr.map((_,i)=>{
      const clk=data.cliques[i]||0, imp=data.impressao[i]||0;
      return imp>0?(clk/imp)*100:0;
    });
  }
  // CTR: se veio > 100, é erro — recalcular de cliques/impressao
  if(Math.max(...data.ctr.filter(v=>v>0), 0) > 100){
    data.ctr = data.ctr.map((_,i)=>{
      const clk=data.cliques[i]||0, imp=data.impressao[i]||0;
      return imp>0?(clk/imp)*100:0;
    });
  }
  // CTR: se veio como decimal (< 1), multiplicar por 100
  const ctrFilled = data.ctr.filter(v=>v>0);
  if(ctrFilled.length>0 && Math.max(...ctrFilled) < 1){
    data.ctr = data.ctr.map(v=>v>0?v*100:0);
  }

  // cplCrm e taxaConv: NÃO salvar — sempre calculados dos dados brutos em calcMonthVal
  // Zerar para garantir que calcMonthVal não usa valor errado
  data.cplCrm  = new Array(12).fill(0);
  data.taxaConv = new Array(12).fill(0);

  return data;
}

function doImport(){
  const sel=wiz.sheets.filter(s=>s.selected);
  if(!sel.length){showToast('Selecione ao menos uma aba.','warn');return;}
  let ok=0, errs=[];
  sel.forEach(s=>{
    const key=s.overrideUnit||wiz.targetUnit;
    const yr=s.detectedYear||fbState.activeYear;
    try{
      const d=parseSheetToData(s.rows);
      const ch=fbState.channels[key];
      if(!ch.years) ch.years={};
      // Substituir o ano inteiro (não mesclar)
      ch.years[yr] = Object.fromEntries(FB_METRICS.map(m=>[m.key, [...d[m.key]]]));
      fbState.activeChannel = key;
      fbState.activeYear = yr;
      ok++;
    }catch(e){ errs.push(s.name+': '+e.message); }
  });
  closeModal('importModal');
  if(state.currentPage==='fbads') renderFbPage();
  showToast(ok ? `✓ ${ok} aba${ok>1?'s':''} importada${ok>1?'s':''} com sucesso!` : 'Nenhuma aba importada. '+errs.join('; '), ok?'ok':'error');
  // 💾 Salvar no Supabase em background (não bloqueia a UI)
  if(ok){
    setTimeout(async ()=>{
      showToast('💾 Salvando no banco...', 'ok');
      await saveAllFbUnit(wiz.targetUnit);
      showToast('✓ Dados salvos no banco!', 'ok');
    }, 100);
  }
}

// ── NOVA UNIDADE ──
let _selColor='#C9A96E';
function initColorPicker(){
  const cp=document.getElementById('colorPicker');
  if(!cp) return;
  cp.innerHTML=UNIT_COLORS.map(c=>`<div class="color-swatch${c===_selColor?' active':''}" style="background:${c}" data-color="${c}" onclick="pickColor(this,'${c}')"></div>`).join('');
}
function pickColor(el,c){
  _selColor=c;
  document.querySelectorAll('.color-swatch').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}
function openNewUnit(){
  _selColor='#C9A96E';
  document.getElementById('newUnitName').value='';
  document.getElementById('newUnitModal').classList.add('open');
  setTimeout(initColorPicker,50);
}
function saveNewUnit(){
  const name=document.getElementById('newUnitName').value.trim();
  if(!name){showToast('Digite o nome.','warn');return;}
  const key=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(!key||fbState.channels[key]){showToast('Nome já existe ou inválido.','warn');return;}
  fbState.channels[key]={name,color:_selColor,years:{}};
  closeModal('newUnitModal');
  if(document.getElementById('importModal').classList.contains('open')) renderWizStep1();
  if(state.currentPage==='fbads') renderFbPage();
  showToast(`✓ Unidade "${name}" criada!`,'ok');
}

function addFbCh(){ openImportModal(); }

    </div>
  </div>
</div>

<style>
/* ── CUSTOM METRICS STYLES ── */
.cm-list { display:flex; flex-direction:column; gap:0; }
.cm-item {
  display:grid; grid-template-columns:1fr auto auto;
  align-items:center; gap:12px;
  padding:14px 20px; border-bottom:1px solid var(--border);
}
.cm-item:last-child { border-bottom:none; }
.cm-item:hover { background:var(--surface2); }
.cm-name { font-size:13px; font-weight:600; color:var(--ink); }
.cm-formula { font-size:11px; color:var(--ink-4); margin-top:3px; font-family:'DM Mono',monospace; }
.cm-result { font-size:18px; font-weight:700; font-family:'DM Mono',monospace; color:var(--ink); text-align:right; }
.cm-result-sub { font-size:10px; color:var(--ink-4); text-align:right; margin-top:2px; }
.cm-actions { display:flex; gap:6px; }
.cm-btn { background:none; border:1px solid var(--border-strong); border-radius:var(--radius); padding:5px 9px; font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif; color:var(--ink-3); transition:all .12s; }
.cm-btn:hover { border-color:var(--gold); color:var(--gold-mid); background:var(--gold-light); }
.cm-btn.danger:hover { border-color:#dc2626; color:#dc2626; background:#fee2e2; }

.cm-builder { padding:20px; background:var(--surface2); border-bottom:1px solid var(--border); }
.cm-builder h4 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-3); margin-bottom:14px; }
.cm-row { display:grid; grid-template-columns:1fr auto 1fr auto; gap:10px; align-items:center; margin-bottom:12px; }
.cm-select { padding:8px 10px; border:1px solid var(--border-strong); border-radius:var(--radius); font-size:12px; font-family:'DM Sans',sans-serif; background:#fff; color:var(--ink); outline:none; cursor:pointer; width:100%; }
.cm-op { padding:8px 14px; border:1px solid var(--border-strong); border-radius:var(--radius); font-size:14px; font-weight:700; font-family:'DM Mono',monospace; background:#fff; color:var(--ink); outline:none; cursor:pointer; text-align:center; }
.cm-preview { margin-top:14px; padding:12px 16px; background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); display:flex; align-items:center; gap:16px; }
.cm-preview-val { font-size:24px; font-weight:700; font-family:'DM Mono',monospace; color:var(--ink); }
.cm-preview-label { font-size:11px; color:var(--ink-4); }
.cm-empty { padding:32px; text-align:center; color:var(--ink-4); font-size:13px; }

/* Cards na página FBAds */
.custom-metrics-strip { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.custom-metric-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:16px 18px;
  box-shadow:var(--shadow); border-top:2px solid var(--gold-mid);
}
.cmc-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); margin-bottom:6px; }
.cmc-val { font-size:22px; font-weight:600; font-family:'DM Mono',monospace; color:var(--ink); }
.cmc-sub { font-size:10px; color:var(--ink-4); margin-top:4px; }
</style>

<script>
// ══════════════════════════════════════════════════════
// SISTEMA DE MÉTRICAS PERSONALIZADAS
// ══════════════════════════════════════════════════════

// Todas as métricas disponíveis como operandos
const CM_OPERANDS = [
  { key:'investimento', label:'Investimento (R$)',   fmt:'money' },
  { key:'leads',        label:'Leads',               fmt:'num'   },
  { key:'leadsCrm',     label:'Leads CRM',           fmt:'num'   },
  { key:'alcance',      label:'Alcance',             fmt:'num'   },
  { key:'impressao',    label:'Impressões',          fmt:'num'   },
  { key:'cliques',      label:'Cliques',             fmt:'num'   },
  { key:'pageview',     label:'Pageviews',           fmt:'num'   },
  { key:'frequencia',   label:'Frequência',          fmt:'dec'   },
  { key:'_const_100',   label:'Constante: 100',      fmt:'num'   },
  { key:'_const_1000',  label:'Constante: 1.000',    fmt:'num'   },
];

const CM_OPS = [
  { sym:'÷', label:'Dividir (A ÷ B)',    fn:(a,b)=>b!==0?a/b:null },
  { sym:'×', label:'Multiplicar (A × B)',fn:(a,b)=>a*b },
  { sym:'+', label:'Somar (A + B)',       fn:(a,b)=>a+b },
  { sym:'−', label:'Subtrair (A − B)',    fn:(a,b)=>a-b },
  { sym:'%', label:'Percentual (A/B×100)',fn:(a,b)=>b!==0?(a/b)*100:null },
];

const CM_RESULT_FMTS = [
  { key:'money', label:'Valor (R$)' },
  { key:'pct',   label:'Porcentagem (%)' },
  { key:'num',   label:'Número inteiro' },
  { key:'dec',   label:'Decimal' },
];

// Estado persistente das métricas customizadas
let customMetrics = JSON.parse(localStorage.getItem('cm_metrics') || '[]');

function saveCustomMetrics(){
  try { localStorage.setItem('cm_metrics', JSON.stringify(customMetrics)); } catch(e){}
  saveCustomMetricsToDB(); // 💾 Supabase
}

function getOperandValue(key, data, filled){
  if(key.startsWith('_const_')) return parseFloat(key.replace('_const_',''));
  // Usa todos os meses com dados
  return (data[key]||[]).reduce((a,b)=>a+(b||0), 0);
}

function evalCustomMetric(m, data, filled){
  const a = getOperandValue(m.operandA, data, filled);
  const b = getOperandValue(m.operandB, data, filled);
  const opDef = CM_OPS.find(o=>o.sym===m.op);
  if(!opDef) return null;
  return opDef.fn(a, b);
}

function fmtCM(v, fmt){
  if(v===null||isNaN(v)) return "—";
  switch(fmt){
    case 'money': return "R$ "+v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    case 'pct':   return v.toFixed(2).replace(".",",")+"%";
    case 'dec':   return v.toFixed(2).replace(".",",");
    case 'num':   return Math.round(v).toLocaleString("pt-BR");
    default:      return String(v);
  }
}

// ── Modal ──
let cmEditing = -1; // índice sendo editado, -1 = novo

function openCustomMetrics(){
  cmEditing = -1;
  renderCustomMetricsModal();
  document.getElementById('customMetricsModal').classList.add('open');
}

function renderCustomMetricsModal(){
  const d = fbAD(), filled = fbFilled();
  const listHTML = customMetrics.length === 0
    ? `<div class="cm-empty">Nenhuma métrica criada ainda.<br>Clique em <strong>Nova Métrica</strong> para começar.</div>`
    : `<div class="cm-list">${customMetrics.map((m,i)=>{
        const val = evalCustomMetric(m, d, filled);
        const valFmt = fmtCM(val, m.fmt);
        const aLabel = CM_OPERANDS.find(o=>o.key===m.operandA)?.label||m.operandA;
        const bLabel = CM_OPERANDS.find(o=>o.key===m.operandB)?.label||m.operandB;
        const opLabel = CM_OPS.find(o=>o.sym===m.op)?.sym||m.op;
        return `<div class="cm-item" id="cm-item-${i}">
          <div>
            <div class="cm-name">${m.name}</div>
            <div class="cm-formula">${aLabel} ${opLabel} ${bLabel}</div>
          </div>
          <div>
            <div class="cm-result">${valFmt}</div>
            <div class="cm-result-sub">${m.fmt==='pct'?'%':m.fmt==='money'?'R$':''} · período atual</div>
          </div>
          <div class="cm-actions">
            <button class="cm-btn" onclick="editCustomMetric(${i})" title="Editar">✏</button>
            <button class="cm-btn danger" onclick="deleteCustomMetric(${i})" title="Remover">✕</button>
          </div>
        </div>`;
      }).join('')}</div>`;

  const builderHTML = cmEditing >= 0 ? renderBuilder(customMetrics[cmEditing]) : '';
  const newBuilderHTML = cmEditing === -2 ? renderBuilder(null) : '';

  document.getElementById('customMetricsBody').innerHTML =
    (cmEditing === -2 ? newBuilderHTML : '') +
    (cmEditing >= 0 ? builderHTML : '') +
    listHTML;
}

function renderBuilder(existing){
  const optsA = CM_OPERANDS.map(o=>`<option value="${o.key}" ${existing?.operandA===o.key?'selected':''}>${o.label}</option>`).join('');
  const optsB = CM_OPERANDS.map(o=>`<option value="${o.key}" ${existing?.operandB===o.key?'selected':''}`+(o.key==='leads'&&!existing?' selected':'')+`>${o.label}</option>`).join('');
  const optsOp = CM_OPS.map(o=>`<option value="${o.sym}" ${existing?.op===o.sym?'selected':''}>${o.sym} — ${o.label}</option>`).join('');
  const optsFmt = CM_RESULT_FMTS.map(f=>`<option value="${f.key}" ${existing?.fmt===f.key?'selected':''}>${f.label}</option>`).join('');
  const isNew = !existing;
  return `<div class="cm-builder">
    <h4>${isNew?'Nova métrica':'Editar métrica'}</h4>
    <div style="margin-bottom:12px;">
      <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px;">Nome da métrica</label>
      <input id="cmName" class="form-input" value="${existing?.name||''}" placeholder="Ex: Custo por Pageview" style="width:100%;">
    </div>
    <div class="cm-row">
      <div>
        <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px;">Métrica A</label>
        <select id="cmA" class="cm-select" onchange="updateCMPreview()">${optsA}</select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px;">Operação</label>
        <select id="cmOp" class="cm-op" onchange="updateCMPreview()" style="min-width:120px;">${optsOp}</select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px;">Métrica B</label>
        <select id="cmB" class="cm-select" onchange="updateCMPreview()">${optsB}</select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px;">Formato</label>
        <select id="cmFmt" class="cm-select" onchange="updateCMPreview()" style="min-width:100px;">${optsFmt}</select>
      </div>
    </div>
    <div class="cm-preview" id="cmPreview">
      <div>
        <div class="cm-preview-label">Prévia (período atual)</div>
        <div class="cm-preview-val" id="cmPreviewVal">—</div>
      </div>
      <div style="flex:1;padding-left:16px;border-left:1px solid var(--border);">
        <div class="cm-preview-label">Cálculo</div>
        <div id="cmPreviewCalc" style="font-size:12px;color:var(--ink-3);font-family:'DM Mono',monospace;margin-top:2px;">—</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn" onclick="cancelCMEdit()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveCMEdit(${cmEditing})">
        ${isNew?'Criar métrica':'Salvar alterações'}
      </button>
    </div>
  </div>`;
}

function addCustomMetric(){
  cmEditing = -2;
  renderCustomMetricsModal();
  setTimeout(updateCMPreview, 50);
}

function editCustomMetric(i){
  cmEditing = i;
  renderCustomMetricsModal();
  setTimeout(updateCMPreview, 50);
}

function cancelCMEdit(){
  cmEditing = -1;
  renderCustomMetricsModal();
}

function deleteCustomMetric(i){
  // Sem confirm() — mostrar botão de confirmação inline no item
  const item = document.getElementById('cm-item-'+i);
  if(!item) return;
  item.innerHTML = `<div style="flex:1;padding:4px 0;">
    <div class="cm-name" style="color:var(--bad);">Remover "${customMetrics[i].name}"?</div>
    <div class="cm-formula">Esta ação não pode ser desfeita.</div>
  </div>
  <div class="cm-actions">
    <button class="cm-btn" onclick="renderCustomMetricsModal()" style="min-width:70px;">Cancelar</button>
    <button class="cm-btn danger" onclick="confirmDeleteMetric(${i})" style="min-width:70px;border-color:#dc2626;color:#dc2626;">Confirmar</button>
  </div>`;
}
function confirmDeleteMetric(i){
  customMetrics.splice(i,1);
  saveCustomMetrics();
  renderCustomMetricsModal();
  if(state.currentPage==='fbads') renderFbPage();
}

function updateCMPreview(){
  const elA=document.getElementById('cmA');
  const elB=document.getElementById('cmB');
  const elOp=document.getElementById('cmOp');
  const elFmt=document.getElementById('cmFmt');
  if(!elA||!elB||!elOp) return;
  const d=fbAD(), filled=fbFilled();
  const a=getOperandValue(elA.value, d, filled);
  const b=getOperandValue(elB.value, d, filled);
  const opDef=CM_OPS.find(o=>o.sym===elOp.value);
  if(!opDef) return;
  const result=opDef.fn(a,b);
  const fmt=elFmt?.value||'num';
  const aLabel=CM_OPERANDS.find(o=>o.key===elA.value)?.label||elA.value;
  const bLabel=CM_OPERANDS.find(o=>o.key===elB.value)?.label||elB.value;
  document.getElementById('cmPreviewVal').textContent = fmtCM(result, fmt);
  document.getElementById('cmPreviewCalc').innerHTML =
    `${aLabel}<br>${elOp.value} ${bLabel}<br>= ${a.toLocaleString('pt-BR',{maximumFractionDigits:2})} ${elOp.value} ${b.toLocaleString('pt-BR',{maximumFractionDigits:2})}`;
}

function saveCMEdit(idx){
  const name=document.getElementById('cmName')?.value?.trim();
  const operandA=document.getElementById('cmA')?.value;
  const operandB=document.getElementById('cmB')?.value;
  const op=document.getElementById('cmOp')?.value;
  const fmt=document.getElementById('cmFmt')?.value||'num';
  if(!name){showToast('Digite um nome para a métrica.','warn');return;}
  const metric={name,operandA,operandB,op,fmt};
  if(idx===-2){ customMetrics.push(metric); }
  else { customMetrics[idx]=metric; }
  saveCustomMetrics();
  cmEditing=-1;
  renderCustomMetricsModal();
  if(state.currentPage==='fbads') renderFbPage();
  showToast('✓ Métrica salva!','ok');
}

// ── Renderizar cards na página FBAds ──
function renderCustomMetricCards(){
  if(!customMetrics.length) return '';
  const d=fbAD(), filled=fbFilled();
  const cards=customMetrics.map(m=>{
    const val=evalCustomMetric(m,d,filled);
    const aLabel=CM_OPERANDS.find(o=>o.key===m.operandA)?.label||m.operandA;
    const bLabel=CM_OPERANDS.find(o=>o.key===m.operandB)?.label||m.operandB;
    return `<div class="custom-metric-card">
      <div class="cmc-label">${m.name}</div>
      <div class="cmc-val">${fmtCM(val,m.fmt)}</div>
      <div class="cmc-sub">${aLabel} ${m.op} ${bLabel}</div>
    </div>`;
  }).join('');
  return `<div class="sec-label" style="display:flex;align-items:center;justify-content:space-between;">
    Métricas personalizadas
    <button onclick="openCustomMetrics()" style="font-size:10px;font-weight:600;color:var(--gold-mid);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;">✏ Gerenciar</button>
  </div>
  <div class="custom-metrics-strip">${cards}</div>`;
}
</script>
</body>
</html>
